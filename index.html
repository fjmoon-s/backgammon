<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バックギャモン</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 16px; transition: background 0.4s, color 0.4s; }

.point-cell { position: relative; width: 52px; height: 192px; cursor: pointer; overflow: visible; }
.tri { position: absolute; width: 0; height: 0; border-left: 26px solid transparent; border-right: 26px solid transparent; pointer-events: none; }
.pt-overlay { position: absolute; inset: 0; z-index: 5; pointer-events: none; border-radius: 2px; }
.pt-selected { background: rgba(255,210,0,0.45); }
/* 移動先ハイライト: テーマ別にCSSで上書き */
.pt-highlight { background: rgba(255,255,255,0.16); }
.pt-num { position: absolute; left: 0; right: 0; text-align: center; font-size: 0.72rem; font-weight: bold; z-index: 12; pointer-events: none; background: rgba(0,0,0,0.5); color: #fff !important; line-height: 1.7; }
.pt-num.up { bottom: 0; border-radius: 0 0 2px 2px; }
.pt-num.dn { top: 0; border-radius: 2px 2px 0 0; }
.checkers-up { position: absolute; top: 4px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 0; z-index: 10; }
.checkers-dn { position: absolute; bottom: 4px; left: 0; right: 0; display: flex; flex-direction: column-reverse; align-items: center; gap: 0; z-index: 10; }
.checker { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: bold; flex-shrink: 0; cursor: pointer; transition: transform 0.1s; position: relative; z-index: 10; }
.checker:hover { transform: scale(1.08); }
.checker.stacked { width: 38px; height: 38px; margin-top: -8px; margin-bottom: -8px; }
.board-shell { display: flex; flex-direction: row; align-items: stretch; gap: 4px; padding: 4px; border-radius: 6px; }
.board-half { display: flex; flex-direction: column; }
.half-top, .half-bot { display: flex; flex-direction: row; }
.mid-spacer { height: 28px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
.bar-col { width: 44px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: background 0.15s; border-radius: 3px; }
.bar-section-top { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 6px; gap: 2px; }
.bar-section-bot { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; gap: 2px; }
.bar-label { font-size: 0.5rem; writing-mode: vertical-rl; padding: 4px 0; }
.bearoff-col { width: 48px; display: flex; flex-direction: column; align-items: center; border-radius: 3px; padding: 4px 2px; gap: 2px; }
.bearoff-label { font-size: 0.58rem; } .bearoff-count { font-size: 1.1rem; font-weight: bold; }
.bearoff-pips { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; justify-content: flex-start; width: 100%; }

/* ── サイコロ ── */
.dice-row { display: flex; gap: 12px; align-items: center; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
.die-wrap { transition: opacity 0.25s; }
.die-wrap.used { opacity: 0.22; }
/* roll animation */
@keyframes dieRoll {
  0%   { transform: rotate(0deg) scale(1); }
  20%  { transform: rotate(-18deg) scale(1.15); }
  40%  { transform: rotate(22deg) scale(0.92); }
  60%  { transform: rotate(-14deg) scale(1.1); }
  80%  { transform: rotate(10deg) scale(0.96); }
  100% { transform: rotate(0deg) scale(1); }
}
.die-wrap.rolling { animation: dieRoll 0.45s ease-out; }
/* ゾロ目バナー */
@keyframes doubletPop {
  0%   { opacity:0; transform: scale(0.5) translateY(-10px); }
  40%  { opacity:1; transform: scale(1.15) translateY(0); }
  70%  { transform: scale(0.95); }
  100% { opacity:1; transform: scale(1); }
}
.doublet-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 1rem; font-weight: bold; padding: 4px 14px;
  border-radius: 20px; animation: doubletPop 0.5s ease-out forwards;
}

.status-bar { border-radius: 8px; padding: 10px 24px; margin-bottom: 10px; text-align: center; width: 100%; max-width: 780px; }
.status-turn { font-size: 1rem; font-weight: bold; } .status-msg { font-size: 0.82rem; margin-top: 3px; min-height: 1.2em; opacity: 0.7; }
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }

button:disabled { opacity: 0.3; cursor: not-allowed; }
.log { border-radius: 8px; padding: 6px 12px; margin-top: 10px; width: 100%; max-width: 780px; max-height: 72px; overflow-y: auto; font-size: 0.72rem; }
.log-entry { border-bottom: 1px solid rgba(255,255,255,0.06); padding: 1px 0; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); display: flex; align-items: center; justify-content: center; z-index: 100; }
.winner-box { border-radius: 14px; padding: 44px 64px; text-align: center; }
.winner-box h2 { font-size: 2rem; margin-bottom: 10px; } .winner-box p { margin-bottom: 28px; opacity: 0.7; }

/* ── モーダル ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
.modal-box { border-radius: 12px; padding: 32px 36px; max-width: 520px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; }
.modal-box h2 { font-size: 1.3rem; font-weight: bold; margin-bottom: 18px; }

.modal-box ul { padding-left: 18px; }
.modal-close { position: absolute; top: 14px; right: 18px; background: none; border: none; font-size: 1.4rem; cursor: pointer; padding: 0; opacity: 0.6; font-weight: normal; }
.modal-close:hover { opacity: 1; }

/* ── theme picker ── */
.theme-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 32px; background: #EDE0B8; }
.theme-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

.start-btn { padding: 14px 48px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; letter-spacing: 2px; transition: opacity 0.2s, transform 0.15s; }

<body class="t-retro">
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo, useEffect, useRef } = React;

/* ── THEMES ── */
const THEMES = {
  retro: { key:'retro', cls:'t-retro', name:'RETRO CHIC', icon:'🎞️' },
  lofi:  { key:'lofi',  cls:'t-lofi',  name:'LO-FI CHILL', icon:'🎧' },
  cyber: { key:'cyber', cls:'t-cyber', name:'CYBERPUNK',   icon:'⚡' },
};

/* ── GAME CONSTANTS ── */
const WHITE='white', BLACK='black';
const mkBoard=()=>{
  const b=Array.from({length:24},()=>({color:null,count:0}));
  b[23]={color:WHITE,count:2}; b[12]={color:WHITE,count:5};
  b[7] ={color:WHITE,count:3}; b[5] ={color:WHITE,count:5};
  b[0] ={color:BLACK,count:2}; b[11]={color:BLACK,count:5};
  b[16]={color:BLACK,count:3}; b[18]={color:BLACK,count:5};
  return b;
};
const INIT={board:mkBoard(),bar:{white:0,black:0},borneOff:{white:0,black:0},currentPlayer:WHITE,dice:[],usedDice:[],phase:'roll',selected:null,winner:null,log:[]};

/* ── GAME LOGIC ── */
const idx2pt=i=>i+1;
const rollDice=()=>{const a=~~(Math.random()*6)+1,b=~~(Math.random()*6)+1;return a===b?[a,a,a,a]:[a,b];};
const isInHome=(i,c)=>c===WHITE?i<=5:i>=18;
const allInHome=(board,bar,c)=>{
  if(bar[c]>0)return false;
  for(let i=0;i<24;i++)if(board[i].color===c&&board[i].count>0&&!isInHome(i,c))return false;
  return true;
};
const canLand=(board,to,c)=>{const p=board[to];return !p.color||p.color===c||p.count===1;};
const unusedVals=(dice,used)=>{
  const cp=[...used],r=[];
  for(let i=0;i<dice.length;i++){const p=cp.indexOf(i);if(p===-1)r.push(dice[i]);else cp.splice(p,1);}
  return r;
};
const hasHigher=(board,from,c)=>{
  if(c===WHITE){for(let i=from+1;i<=5;i++)if(board[i].color===WHITE&&board[i].count>0)return true;}
  else{for(let i=from-1;i>=18;i--)if(board[i].color===BLACK&&board[i].count>0)return true;}
  return false;
};
const movesFromBar=(board,dice,used,c)=>
  [...new Set(unusedVals(dice,used))].flatMap(v=>{
    const to=(c===WHITE?25-v:v)-1;
    return to>=0&&to<24&&canLand(board,to,c)?[{from:'bar',to,dieValue:v}]:[];
  });
const movesFromPt=(board,bar,dice,used,c,from)=>{
  if(bar[c]>0)return[];
  const pt=board[from];if(!pt.color||pt.color!==c||!pt.count)return[];
  const bearOk=allInHome(board,bar,c),dir=c===WHITE?-1:1,moves=[];
  for(const v of[...new Set(unusedVals(dice,used))]){
    const to=from+dir*v;
    if(to>=0&&to<24){if(canLand(board,to,c))moves.push({from,to,dieValue:v});}
    else if(bearOk){
      const hp=c===WHITE?idx2pt(from):(25-idx2pt(from));
      if(hp===v)moves.push({from,to:'bearoff',dieValue:v});
      else if(hp<v&&!hasHigher(board,from,c))moves.push({from,to:'bearoff',dieValue:v});
    }
  }
  return moves;
};
const allMoves=(board,bar,dice,used,c)=>{
  const raw=bar[c]>0?movesFromBar(board,dice,used,c)
    :Array.from({length:24},(_,i)=>i).flatMap(i=>movesFromPt(board,bar,dice,used,c,i));
  const seen=new Set();
  return raw.filter(m=>{const k=`${m.from}-${m.to}-${m.dieValue}`;if(seen.has(k))return false;seen.add(k);return true;});
};
const applyMove=(board,bar,borneOff,move,c,dice,used,theme)=>{
  const b=board.map(p=>({...p})),nb={...bar},nbo={...borneOff},opp=c===WHITE?BLACK:WHITE;
  // テーマに応じたプレイヤー名
  const pName=(col)=>{
    if(theme==='cyber') return col===WHITE?'シアン':'ピンク';
    return col===WHITE?'W':'B';
  };
  let msg='';
  if(move.from==='bar'){nb[c]=Math.max(0,nb[c]-1);msg=`${pName(c)} バー→pt${idx2pt(move.to)}`;}
  else{b[move.from]={...b[move.from],count:b[move.from].count-1};if(!b[move.from].count)b[move.from].color=null;}
  if(move.to==='bearoff'){nbo[c]++;msg=`${pName(c)} pt${idx2pt(move.from)} ベアオフ`;}
  else{
    const d=b[move.to];
    if(d.color===opp&&d.count===1){nb[opp]++;b[move.to]={color:c,count:1};msg=`${pName(c)} pt${idx2pt(move.to)} ヒット！`;}
    else{b[move.to]={color:c,count:(d.color===c?d.count:0)+1};if(!msg)msg=`${pName(c)} ${move.from==='bar'?'bar':'pt'+idx2pt(move.from)}→pt${idx2pt(move.to)}`;}
  }
  const nu=[...used];
  for(let i=0;i<dice.length;i++)if(dice[i]===move.dieValue&&!nu.includes(i)){nu.push(i);break;}
  return {board:b,bar:nb,borneOff:nbo,usedDice:nu,logMsg:msg};
};
const checkWinner=bo=>bo.white===15?WHITE:bo.black===15?BLACK:null;

/* ── SVGサイコロ ── */
// ドット座標定義
const DOT_POSITIONS = {
  1: [[50,50]],
  2: [[25,25],[75,75]],
  3: [[25,25],[50,50],[75,75]],
  4: [[25,25],[75,25],[25,75],[75,75]],
  5: [[25,25],[75,25],[50,50],[25,75],[75,75]],
  6: [[25,22],[75,22],[25,50],[75,50],[25,78],[75,78]],
};

function DieSVG({value, theme, rolling}) {
  // テーマ別スタイル
  const styles = {
    retro: { bg:'#F5F0E0', border:'#8B3A10', dot:'#3A1800', shadow:'3px 3px 0 #8B3A10', radius:8 },
    lofi:  { bg:'#E8D8B8', border:'#7A8C6A', dot:'#2A1800', shadow:'none',              radius:6 },
    cyber: { bg:'#EEFFFF', border:'#00FFFF', dot:'#003344', shadow:'0 0 8px #00FFFF66', radius:2 },
  };
  const s = styles[theme] || styles.retro;
  const dots = DOT_POSITIONS[value] || [];
  return (
    <svg width="46" height="46" viewBox="0 0 100 100"
      style={{
        borderRadius: s.radius,
        boxShadow: s.shadow,
        border: `2px solid ${s.border}`,
        display: 'block',
        background: s.bg,
      }}>
      <rect x="0" y="0" width="100" height="100" fill={s.bg} rx={s.radius}/>
      {dots.map(([cx,cy],i)=>(
        <circle key={i} cx={cx} cy={cy} r="10" fill={s.dot}/>
      ))}
    </svg>
  );
}

function DieWrap({value, used, theme, rolling}) {
  return (
    <div className={`die-wrap${used?' used':''}${rolling?' rolling':''}`}>
      <DieSVG value={value} theme={theme} rolling={rolling}/>
    </div>
  );
}

/* ── コマアイコン ── */
function CheckerIcon({color,theme,size=20}) {
  const bg=color===WHITE?(theme==='cyber'?'#00FFEE':theme==='lofi'?'#D8C8A8':'#F5F0E0'):(theme==='cyber'?'#FF44CC':theme==='lofi'?'#5A4838':'#3A1800');
  const border=color===WHITE?(theme==='cyber'?'#fff':theme==='lofi'?'#A89878':'#8B3A10'):(theme==='cyber'?'#fff':theme==='lofi'?'#9A8868':'#C4A24A');
  return <span style={{display:'inline-block',width:size,height:size,borderRadius:'50%',background:bg,border:`2px solid ${border}`,verticalAlign:'middle',flexShrink:0,boxShadow:theme==='cyber'?`0 0 6px ${bg}66`:undefined}}/>;
}

/* ── 遊び方モーダル ── */
function HowToModal({onClose,theme}) {
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <button className="modal-close" onClick={onClose}>✕</button>
        <h2>🎲 遊び方</h2>
        <h3>ゲームの目的</h3>
        <p>自分の15枚のコマを全てゴール（ベアオフ）させたら勝ちです。</p>
        <h3>基本の流れ</h3>
        <ul>
          <li>サイコロを2個振り、出た目の数だけコマを動かします。</li>
          <li>ホワイトは24→1方向、ブラックは1→24方向に進みます。</li>
          <li>2つの目は別々のコマに使っても、1つのコマに合算して使ってもOKです。</li>
          <li>ゾロ目が出たら4回分動かせます。</li>
        </ul>
        <h3>ヒット</h3>
        <ul>
          <li>相手のコマが1枚だけのマス（ブロット）に乗ると、そのコマをバーへ送れます。</li>
          <li>バーにコマがある間は、他のコマを動かせません。まずバーから入場させましょう。</li>
        </ul>
        <h3>ブロック</h3>
        <p>相手のコマが2枚以上いるマスには入れません。6マス連続でブロックするとプライムと呼びます。</p>
        <h3>ベアオフ（上がり）</h3>
        <ul>
          <li>自分の全コマがホームボード（白:1〜6pt、黒:19〜24pt）に入ったらベアオフ開始です。</li>
          <li>ぴったりの目のコマを上げられます。</li>
          <li>該当ポイントにコマがない場合、それより小さい目のコマを動かします。</li>
          <li>一番後ろのコマだけは、超過した目でも上げられます。</li>
        </ul>
        <h3>操作方法</h3>
        <ul>
          <li>動かしたいコマをクリック → 移動先をクリック（明るいハイライトで表示）</li>
          <li>バーのコマはバー部分をクリックして選択できます</li>
        </ul>
        <div style={{marginTop:20,textAlign:'center'}}>
          <button className="btn-primary" onClick={onClose} style={{padding:'8px 32px'}}>閉じる</button>
        </div>
      </div>
    </div>
  );
}

/* ── CHECKER / POINT ── */
function Checker({color,stacked,count}) {
  return <div className={`checker ${color}${stacked?' stacked':''}`}>{count>1?count:''}</div>;
}
function PointCheckers({point,dir}) {
  if(!point.color||!point.count)return null;
  const show=Math.min(point.count,5);
  return (
    <div className={dir==='up'?'checkers-up':'checkers-dn'}>
      {Array.from({length:show},(_,i)=><Checker key={i} color={point.color} stacked={i>0} count={i===show-1&&point.count>5?point.count:''}/>)}
      {point.count>5&&<div style={{fontSize:'0.7rem',fontWeight:'bold',zIndex:11,position:'relative',opacity:.9}}>×{point.count}</div>}
    </div>
  );
}
function BearOffTray({color,count,theme}) {
  const bg=color===WHITE?(theme==='cyber'?'#00FFEE':theme==='lofi'?'#D8C8A8':'#F0E8C0'):(theme==='cyber'?'#FF44CC':theme==='lofi'?'#5A4838':'#3A1800');
  return (
    <div className="bearoff-col">
      <div className="bearoff-label">{color===WHITE?'W':'B'}</div>
      <div className="bearoff-count">{count}</div>
      <div className="bearoff-pips">
        {Array.from({length:Math.min(count,8)},(_,i)=><div key={i} style={{width:28,height:8,borderRadius:4,background:bg,opacity:.8}}/>)}
        {count>8&&<div style={{fontSize:'0.6rem',opacity:.7}}>+{count-8}</div>}
      </div>
    </div>
  );
}

/* ── BOARD ── */
function Board({gs,onPoint,onBar,legalMoves,barSelected,barDestSet,theme}) {
  const {board,bar,borneOff,currentPlayer,selected}=gs;
  const fromSet=useMemo(()=>{
    if(barSelected)return new Set();
    const s=new Set();legalMoves.forEach(m=>{if(m.from!=='bar')s.add(m.from);});return s;
  },[legalMoves,barSelected]);
  const toSet=useMemo(()=>{
    if(barSelected)return barDestSet;
    if(selected===null)return new Set();
    const s=new Set();legalMoves.filter(m=>m.from===selected).forEach(m=>{if(m.to!=='bearoff')s.add(m.to);});return s;
  },[legalMoves,selected,barSelected,barDestSet]);
  const hasBearOff=!barSelected&&selected!==null&&legalMoves.some(m=>m.from===selected&&m.to==='bearoff');
  const barCanEnter=legalMoves.some(m=>m.from==='bar');
  const topL=[12,13,14,15,16,17],topR=[18,19,20,21,22,23],botL=[11,10,9,8,7,6],botR=[5,4,3,2,1,0];
  const renderPt=(idx,dir)=>{
    const tc=idx%2===0?'tA':'tB';
    const isSel=selected===idx,isFrom=!barSelected&&!selected&&fromSet.has(idx),isTo=toSet.has(idx);
    return (
      <div key={idx} className="point-cell" onClick={()=>onPoint(idx)} title={`Point ${idx2pt(idx)}`}>
        <div className={`tri ${dir} ${tc}`}/>
        {(isSel||isFrom||isTo)&&<div className={`pt-overlay ${isSel?'pt-selected':'pt-highlight'}`}/>}
        <div className={`pt-num ${dir}`}>{idx2pt(idx)}</div>
        <PointCheckers point={board[idx]} dir={dir}/>
      </div>
    );
  };
  const bearBg=active=>active?'rgba(255,220,0,0.35)':(theme==='cyber'?'#0A0520':theme==='lofi'?'#222018':'#9A7020');
  const bearBorder=active=>active?'2px dashed rgba(255,220,50,0.9)':'2px solid transparent';
  return (
    <div className="board-shell">
      <div className="board-half">
        <div className="half-top">{topL.map(i=>renderPt(i,'up'))}</div>
        <div className="mid-spacer" style={{width:52*6}}>· · ·</div>
        <div className="half-bot">{botL.map(i=>renderPt(i,'dn'))}</div>
      </div>
      <div className={`bar-col${barCanEnter||barSelected?' can-enter':''}`} onClick={onBar} style={barSelected?{opacity:.8}:{}} title="バー">
        <div className="bar-section-top">
          <div className="bar-label">BAR</div>
          {bar.black>0&&<Checker color="black" count={bar.black}/>}
        </div>
        <div className="bar-section-bot">
          {bar.white>0&&<Checker color="white" count={bar.white}/>}
          <div className="bar-label">BAR</div>
        </div>
      </div>
      <div className="board-half">
        <div className="half-top">{topR.map(i=>renderPt(i,'up'))}</div>
        <div className="mid-spacer" style={{width:52*6}}>· · ·</div>
        <div className="half-bot">{botR.map(i=>renderPt(i,'dn'))}</div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:4,minWidth:52}}>
        <BearOffTray color={BLACK} count={borneOff.black} theme={theme}/>
        <div style={{flex:1,borderRadius:4,cursor:hasBearOff&&currentPlayer===BLACK?'pointer':'default',background:bearBg(hasBearOff&&currentPlayer===BLACK),border:bearBorder(hasBearOff&&currentPlayer===BLACK),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.6rem',transition:'all .15s'}} onClick={()=>onPoint('bearoff')}>
          {hasBearOff&&currentPlayer===BLACK?'↑OUT':''}
        </div>
        <div style={{flex:1,borderRadius:4,cursor:hasBearOff&&currentPlayer===WHITE?'pointer':'default',background:bearBg(hasBearOff&&currentPlayer===WHITE),border:bearBorder(hasBearOff&&currentPlayer===WHITE),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.6rem',transition:'all .15s'}} onClick={()=>onPoint('bearoff')}>
          {hasBearOff&&currentPlayer===WHITE?'↓OUT':''}
        </div>
        <BearOffTray color={WHITE} count={borneOff.white} theme={theme}/>
      </div>
    </div>
  );
}

/* ── THEME PICKER ── */
function ThemePicker({onStart}) {
  const [sel,setSel]=useState('retro');
  const [showHow,setShowHow]=useState(false);
  // タイトル・サブタイトル・ボタン類は常にレトロ固定
  return (
    <div className="theme-screen">
      {showHow&&<HowToModal onClose={()=>setShowHow(false)} theme="retro"/>}
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'2rem',fontWeight:'bold',letterSpacing:4,color:'#8B3A10',fontFamily:'Georgia,serif'}}>
          🎲 バックギャモン
        </div>
        <div style={{fontSize:'0.85rem',marginTop:6,letterSpacing:2,color:'#8B3A10',opacity:0.65,fontFamily:'Georgia,serif'}}>
          テーマを選んでゲームスタート
        </div>
      </div>

      <div className="theme-cards">
        {Object.values(THEMES).map(th=>(
          <div key={th.key} className={`theme-card${sel===th.key?' selected':''}`} onClick={()=>setSel(th.key)}
            style={{
              background:th.key==='retro'?'#D4C090':th.key==='lofi'?'#28282F':'#080820',
              color:th.key==='retro'?'#3A1800':th.key==='lofi'?'#C8B898':'#00FFFF',
              borderColor:sel===th.key?(th.key==='retro'?'#8B3A10':th.key==='lofi'?'#7A8C6A':'#FF00FF'):'transparent',
              boxShadow:sel===th.key&&th.key==='cyber'?'0 0 20px #FF00FF55':undefined,
              fontFamily:th.key==='cyber'?'Courier New,monospace':th.key==='retro'?'Georgia,serif':'inherit',
            }}>
            <div className="theme-card-icon">{th.icon}</div>
            <div className="theme-card-name">{th.name}</div>
          </div>
        ))}
      </div>

      {/* ゲームスタートボタン: 常にレトロ */}
      <button className="start-btn" onClick={()=>onStart(sel)}
        style={{background:'#8B3A10',color:'#F5F0E0',fontFamily:'Georgia,serif',letterSpacing:2,border:'none'}}>
        ゲームスタート →
      </button>

      <button className="how-to-btn" onClick={()=>setShowHow(true)}>
        遊び方を見る
      </button>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [theme,setTheme]=useState(null);
  const [gs,setGs]=useState({...INIT,board:mkBoard()});
  const [showHow,setShowHow]=useState(false);
  const [rollingDice,setRollingDice]=useState([]); // rolling中のdiceインデックス
  const [doubletFlash,setDoubletFlash]=useState(false); // ゾロ目フラッシュ

  const handleStart=useCallback(t=>{
    document.body.className=THEMES[t].cls;
    setTheme(t);
  },[]);

  const legalMoves=useMemo(()=>{
    if(gs.phase!=='move')return[];
    return allMoves(gs.board,gs.bar,gs.dice,gs.usedDice,gs.currentPlayer);
  },[gs]);

  const handleRoll=useCallback(()=>{
    if(gs.phase!=='roll')return;
    const dice=rollDice();
    // アニメーション開始
    const indices=dice.map((_,i)=>i);
    setRollingDice(indices);
    setTimeout(()=>setRollingDice([]),500);
    // ゾロ目フラッシュ
    if(dice.length===4){
      setDoubletFlash(true);
      setTimeout(()=>setDoubletFlash(false),1800);
    }

    const moves=allMoves(gs.board,gs.bar,dice,[],gs.currentPlayer);
    const pName=(c)=>theme==='cyber'?(c===WHITE?'シアン':'ピンク'):(c===WHITE?'ホワイト':'ブラック');
    const log=[`${pName(gs.currentPlayer)}: [${dice.join(', ')}]`,...gs.log.slice(0,29)];
    if(!moves.length){
      setGs(p=>({...p,dice,usedDice:dice.map((_,i)=>i),phase:'roll',currentPlayer:p.currentPlayer===WHITE?BLACK:WHITE,selected:null,log:['手なし → スキップ',...log]}));
    } else {
      setGs(p=>({...p,dice,usedDice:[],phase:'move',selected:null,log}));
    }
  },[gs,theme]);

  const handleEndTurn=useCallback(()=>{
    if(gs.phase!=='move')return;
    setGs(p=>({...p,currentPlayer:p.currentPlayer===WHITE?BLACK:WHITE,dice:[],usedDice:[],phase:'roll',selected:null}));
  },[gs]);

  const doMove=useCallback(move=>{
    const {board,bar,borneOff,usedDice,logMsg}=applyMove(gs.board,gs.bar,gs.borneOff,move,gs.currentPlayer,gs.dice,gs.usedDice,theme);
    const winner=checkWinner(borneOff);
    const log=[logMsg,...gs.log.slice(0,29)];
    const pName=(c)=>theme==='cyber'?(c===WHITE?'シアン':'ピンク'):(c===WHITE?'ホワイト':'ブラック');
    if(winner){setGs(p=>({...p,board,bar,borneOff,winner,phase:'gameover',selected:null,log:[`🏆 ${pName(winner)}の勝ち！`,...log]}));return;}
    const rem=allMoves(board,bar,gs.dice,usedDice,gs.currentPlayer);
    if(usedDice.length===gs.dice.length||!rem.length){
      setGs(p=>({...p,board,bar,borneOff,usedDice:[],currentPlayer:p.currentPlayer===WHITE?BLACK:WHITE,dice:[],phase:'roll',selected:null,log}));
    } else {
      setGs(p=>({...p,board,bar,borneOff,usedDice,selected:null,log}));
    }
  },[gs,theme]);

  const handlePoint=useCallback(idx=>{
    if(gs.phase!=='move')return;
    if(idx==='bearoff'){
      if(gs.selected===null)return;
      const m=legalMoves.find(m=>m.from===gs.selected&&m.to==='bearoff');
      if(m)doMove(m);return;
    }
    if(gs.selected!==null){
      const m=legalMoves.find(m=>m.from===gs.selected&&m.to===idx);
      if(m){doMove(m);return;}
      if(gs.board[idx].color===gs.currentPlayer&&gs.board[idx].count>0){
        const ok=legalMoves.some(m=>m.from===idx);
        setGs(p=>({...p,selected:ok?idx:null}));return;
      }
      setGs(p=>({...p,selected:null}));return;
    }
    if(gs.bar[gs.currentPlayer]>0)return;
    if(gs.board[idx].color!==gs.currentPlayer||!gs.board[idx].count)return;
    if(legalMoves.some(m=>m.from===idx))setGs(p=>({...p,selected:idx}));
  },[gs,legalMoves,doMove]);

  const handleBar=useCallback(()=>{
    if(gs.phase!=='move'||!gs.bar[gs.currentPlayer])return;
    if(legalMoves.some(m=>m.from==='bar'))setGs(p=>({...p,selected:'bar'}));
  },[gs,legalMoves]);

  const handleReset=()=>{setGs({...INIT,board:mkBoard()});setTheme(null);document.body.className='t-retro';};

  const barSel=gs.selected==='bar';
  const barDestSet=useMemo(()=>{
    if(!barSel)return new Set();
    return new Set(legalMoves.filter(m=>m.from==='bar').map(m=>m.to));
  },[barSel,legalMoves]);

  if(!theme)return <ThemePicker onStart={handleStart}/>;

  const canEnd=gs.phase==='move'&&!legalMoves.length;
  const isCyber=theme==='cyber';

  const pName=(c)=>isCyber?(c===WHITE?'シアン':'ピンク'):(c===WHITE?'ホワイト':'ブラック');

  const plLabel=p=>{
    const isW=p===WHITE;
    return (
      <span style={{display:'inline-flex',alignItems:'center',gap:6,
        color:isW?(isCyber?'#00FFEE':theme==='lofi'?'#D8C8A8':'#8B3A10'):(isCyber?'#FF44CC':theme==='lofi'?'#C8704A':'#3A1800'),
        fontWeight:'bold'}}>
        <CheckerIcon color={isW?WHITE:BLACK} theme={theme} size={20}/>
        {pName(p)}
      </span>
    );
  };

  let msg='';
  if(gs.phase==='roll')msg='サイコロを振ってください';
  else if(gs.phase==='move'){
    if(gs.bar[gs.currentPlayer]>0)msg=`バーのコマを入れてください（${gs.bar[gs.currentPlayer]}個）`;
    else if(barSel)msg='バーのコマ選択中 — 移動先を選んでください';
    else if(gs.selected!==null)msg=`pt${idx2pt(gs.selected)} 選択中 — 移動先を選んでください`;
    else msg='コマを選んで移動してください';
    if(canEnd)msg='移動できる手がありません。ターン終了を押してください';
  }

  const boardGs={...gs,selected:barSel?null:gs.selected};
  const fontFam=isCyber?'Courier New,monospace':theme==='retro'?'Georgia,serif':'inherit';
  const titleColor=isCyber?'#00FFFF':theme==='retro'?'#8B3A10':'#C8B898';

  return (
    <div>
      {showHow&&<HowToModal onClose={()=>setShowHow(false)} theme={theme}/>}
      <h1 style={{marginBottom:10,fontSize:'1.4rem',letterSpacing:isCyber?6:3,color:titleColor,fontFamily:fontFam,textShadow:isCyber?'0 0 12px #00FFFF':undefined}}>
        🎲 バックギャモン
      </h1>
      <div className="status-bar">
        <div className="status-turn">
          {gs.phase==='gameover'?<>{plLabel(gs.winner)} の勝利！🎉</>:<>現在のターン: {plLabel(gs.currentPlayer)}</>}
        </div>
        <div className="status-msg">{msg}</div>
      </div>
      <Board gs={boardGs} onPoint={handlePoint} onBar={handleBar}
        legalMoves={legalMoves} barSelected={barSel} barDestSet={barDestSet} theme={theme}/>
      <div className="dice-row">
        {gs.dice.length>0 ? (
          <>
            {/* ゾロ目: 残り使用数バッジ */}
            {gs.dice.length===4 && (
              <div className="doublet-badge">
                ×{gs.dice.length - gs.usedDice.length}
              </div>
            )}
            {gs.dice.map((v,i)=>(
              <DieWrap key={i} value={v} used={gs.usedDice.includes(i)} theme={theme} rolling={rollingDice.includes(i)}/>
            ))}
          </>
        ) : (
          <span style={{opacity:.35,fontSize:'.85rem'}}>サイコロ待ち</span>
        )}
      </div>
      {/* ゾロ目フラッシュ */}
      {doubletFlash && (
        <div style={{
          position:'fixed', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
          zIndex:150, pointerEvents:'none',
        }}>
          <div style={{
            fontSize: isCyber?'2.8rem':'2.4rem',
            fontWeight:'bold',
            padding:'18px 44px',
            borderRadius: isCyber?4:12,
            background: isCyber?'#080820':theme==='lofi'?'#2C2C34':'#EDE0B8',
            border: isCyber?'2px solid #FFFF00':theme==='lofi'?'1px solid #7A8C6A':'3px solid #8B3A10',
            color: isCyber?'#FFFF00':theme==='lofi'?'#B8D898':'#8B3A10',
            boxShadow: isCyber?'0 0 30px #FFFF0088':'0 4px 24px rgba(0,0,0,0.3)',
            fontFamily: isCyber?'Courier New,monospace':theme==='retro'?'Georgia,serif':'inherit',
            letterSpacing: isCyber?4:2,
            animation:'doubletPop 0.5s ease-out forwards',
          }}>
            🎲 ゾロ目！ ×4
          </div>
        </div>
      )}
      <div className="btn-row">
        <button className="btn-primary"   onClick={handleRoll}    disabled={gs.phase!=='roll'}>🎲 サイコロを振る</button>
        <button className="btn-secondary" onClick={handleEndTurn} disabled={!canEnd}>ターン終了</button>
        <button className="btn-secondary" onClick={()=>setShowHow(true)} style={{opacity:.8}}>遊び方</button>
        <button className="btn-danger"    onClick={handleReset}>テーマ選択に戻る</button>
      </div>
      <div className="log">
        {gs.log.map((e,i)=><div key={i} className="log-entry">{e}</div>)}
        {!gs.log.length&&<span style={{opacity:.35}}>ゲームログ</span>}
      </div>
      {gs.winner&&(
        <div className="overlay">
          <div className="winner-box">
            <h2>{pName(gs.winner)} の勝利！🎉</h2>
            <p>おめでとうございます！</p>
            <button className="btn-primary" onClick={handleReset}>もう一度プレイ</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
