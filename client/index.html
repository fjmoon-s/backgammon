<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バックギャモン</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 16px;
}

/* ── status ── */
.status-bar {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 10px 24px;
  margin-bottom: 10px;
  text-align: center;
  width: 100%;
  max-width: 760px;
}
.status-turn { font-size: 1rem; font-weight: bold; }
.status-msg  { font-size: 0.82rem; color: #aaa; margin-top: 3px; min-height: 1.2em; }
.col-white { color: #ffffff; }
.col-black { color: #f0c040; }

/* ── board shell ── */
.board-shell {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  background: #7a5230;
  border: 4px solid #5a3a18;
  border-radius: 6px;
  gap: 4px;
  padding: 4px;
}
.board-half {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.half-top, .half-bot {
  display: flex;
  flex-direction: row;
}
.mid-spacer {
  height: 28px;
  background: #2d5016;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: #555;
}

/* ── bar ── */
.bar-col {
  width: 44px;
  background: #5a3a18;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 3px;
}
.bar-col.can-enter { background: #8a6038; }
.bar-section-top {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 6px;
  gap: 2px;
}
.bar-section-bot {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 6px;
  gap: 2px;
}
.bar-label {
  font-size: 0.5rem;
  color: rgba(255,255,255,0.3);
  writing-mode: vertical-rl;
  padding: 4px 0;
}

/* ── bear-off tray ── */
.bearoff-col {
  width: 48px;
  background: #1a3a09;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-radius: 3px;
  padding: 4px 2px;
  gap: 2px;
}
.bearoff-label { font-size: 0.58rem; color: #777; }
.bearoff-count { font-size: 1.1rem; font-weight: bold; color: #f0c040; }
.bearoff-pips  {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  flex: 1;
  justify-content: flex-start;
  width: 100%;
}

/* ── point ── */
.point-cell {
  position: relative;
  width: 52px;
  height: 192px;
  cursor: pointer;
  overflow: visible;
}
.tri {
  position: absolute;
  width: 0; height: 0;
  border-left: 26px solid transparent;
  border-right: 26px solid transparent;
  pointer-events: none;
}
.tri.up.red   { top: 0;    border-top:    186px solid #8b1a1a; }
.tri.up.cream { top: 0;    border-top:    186px solid #c8b87a; }
.tri.dn.red   { bottom: 0; border-bottom: 186px solid #8b1a1a; }
.tri.dn.cream { bottom: 0; border-bottom: 186px solid #c8b87a; }

.pt-overlay {
  position: absolute;
  inset: 0;
  z-index: 5;
  pointer-events: none;
  border-radius: 2px;
}
.pt-highlight { background: rgba(255,255,255,0.13); }
.pt-selected  { background: rgba(255,220,0,0.22); }

.pt-num {
  position: absolute;
  left: 0; right: 0;
  text-align: center;
  font-size: 0.58rem;
  color: rgba(255,255,255,0.4);
  z-index: 6;
  pointer-events: none;
}
.pt-num.up { bottom: 2px; }
.pt-num.dn { top: 2px; }

.checkers-up {
  position: absolute;
  top: 4px; left: 0; right: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  z-index: 10;
}
.checkers-dn {
  position: absolute;
  bottom: 4px; left: 0; right: 0;
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  gap: 1px;
  z-index: 10;
}

/* ── checker ── */
.checker {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: bold;
  border: 2px solid rgba(0,0,0,0.35);
  flex-shrink: 0;
  cursor: pointer;
  transition: transform 0.1s;
  position: relative;
  z-index: 10;
}
.checker:hover { transform: scale(1.08); }
.checker.white {
  background: radial-gradient(circle at 35% 35%, #fff 0%, #ccc 100%);
  color: #333;
}
.checker.black {
  background: radial-gradient(circle at 35% 35%, #777 0%, #111 100%);
  color: #f0c040;
}
.checker.stacked {
  width: 38px;
  height: 38px;
  margin-top: -10px;
}

/* ── dice ── */
.dice-row {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: center;
  margin: 10px 0;
  flex-wrap: wrap;
}
.die {
  width: 46px; height: 46px;
  background: #fff;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; font-weight: bold; color: #222;
  box-shadow: 2px 3px 8px rgba(0,0,0,0.6);
  transition: opacity 0.25s;
}
.die.used { opacity: 0.22; }

/* ── buttons ── */
.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 6px;
}
button {
  padding: 8px 22px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.88rem;
  font-weight: bold;
  transition: background 0.18s, opacity 0.18s;
}
button:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary   { background: #e6ac00; color: #1a1a2e; }
.btn-primary:hover:not(:disabled) { background: #f0c040; }
.btn-secondary { background: #0f3460; color: #eee; border: 1px solid #334; }
.btn-secondary:hover:not(:disabled) { background: #1a4a80; }
.btn-danger    { background: #7a1a1a; color: #eee; }
.btn-danger:hover:not(:disabled) { background: #a02020; }

/* ── winner overlay ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.winner-box {
  background: #16213e;
  border: 2px solid #e6ac00;
  border-radius: 14px;
  padding: 44px 64px;
  text-align: center;
}
.winner-box h2 { font-size: 2rem; color: #f0c040; margin-bottom: 10px; }
.winner-box p  { color: #aaa; margin-bottom: 28px; }

/* ── log ── */
.log {
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 6px 12px;
  margin-top: 10px;
  width: 100%;
  max-width: 760px;
  max-height: 72px;
  overflow-y: auto;
  font-size: 0.72rem;
  color: #888;
}
.log-entry { border-bottom: 1px solid #1a2a4a; padding: 1px 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useMemo } = React;

// ============================================================
// CONSTANTS
// ============================================================

// Points 1-24 (1 = white's home 1, 24 = white's starting point)
// White moves 24→1, Black moves 1→24
// White bears off from points 1-6, Black bears off from points 19-24

const WHITE = 'white';
const BLACK = 'black';
const POINT_COUNT = 24;

const INITIAL_BOARD = (() => {
  // board[i] = { color: 'white'|'black'|null, count: number }
  // index 0 = point 1, index 23 = point 24
  const b = Array.from({ length: 24 }, () => ({ color: null, count: 0 }));
  // Standard backgammon setup
  // White: 2 on 24, 5 on 13, 3 on 8, 5 on 6
  // Black: 2 on 1,  5 on 12, 3 on 17, 5 on 19
  b[23] = { color: WHITE, count: 2 };  // point 24
  b[12] = { color: WHITE, count: 5 };  // point 13
  b[7]  = { color: WHITE, count: 3 };  // point 8
  b[5]  = { color: WHITE, count: 5 };  // point 6
  b[0]  = { color: BLACK, count: 2 };  // point 1
  b[11] = { color: BLACK, count: 5 };  // point 12
  b[16] = { color: BLACK, count: 3 };  // point 17
  b[18] = { color: BLACK, count: 5 };  // point 19
  return b;
})();

const INITIAL_STATE = {
  board: INITIAL_BOARD,
  bar: { white: 0, black: 0 },
  borneOff: { white: 0, black: 0 },
  currentPlayer: WHITE,
  dice: [],           // e.g. [3,5] or [4,4,4,4] for doubles
  usedDice: [],       // indices of used dice
  phase: 'roll',      // 'roll' | 'move' | 'gameover'
  selected: null,     // point index (0-23) or 'bar'
  winner: null,
  log: [],
};

// ============================================================
// GAME LOGIC
// ============================================================

function rollDice() {
  const d1 = Math.floor(Math.random() * 6) + 1;
  const d2 = Math.floor(Math.random() * 6) + 1;
  return d1 === d2 ? [d1, d1, d1, d1] : [d1, d2];
}

// Point index → point number (1-24)
const idx2pt = i => i + 1;
// Point number → index
const pt2idx = n => n - 1;

// Direction: white moves from high to low (24→1), black moves low to high (1→24)
function moveDir(color) { return color === WHITE ? -1 : 1; }

// Home board indices
function isInHome(idx, color) {
  return color === WHITE ? idx <= 5 : idx >= 18;
}

// All checkers in home?
function allInHome(board, bar, color) {
  if (bar[color] > 0) return false;
  for (let i = 0; i < 24; i++) {
    if (board[i].color === color && board[i].count > 0) {
      if (!isInHome(i, color)) return false;
    }
  }
  return true;
}

// Available (unused) dice values
function availDice(dice, usedDice) {
  const used = [...usedDice];
  return dice.filter((_, i) => {
    const ui = used.indexOf(i);
    if (ui !== -1) { used.splice(ui, 1); return false; }
    // not a perfect filter but works since we pass usedDice as array of indices
    return true;
  });
}

// Get unique unused dice values
function unusedDiceValues(dice, usedDice) {
  const remaining = [];
  const usedCopy = [...usedDice];
  for (let i = 0; i < dice.length; i++) {
    const pos = usedCopy.indexOf(i);
    if (pos === -1) {
      remaining.push(dice[i]);
    } else {
      usedCopy.splice(pos, 1);
    }
  }
  return remaining;
}

// Can a checker of `color` land on `toIdx`?
function canLand(board, toIdx, color) {
  const pt = board[toIdx];
  if (!pt.color || pt.color === color) return true;   // empty or own
  if (pt.count === 1) return true;                     // blot → hit
  return false;
}

// Legal moves from bar
function legalMovesFromBar(board, bar, dice, usedDice, color) {
  const vals = unusedDiceValues(dice, usedDice);
  const unique = [...new Set(vals)];
  const moves = [];
  const dir = moveDir(color);
  for (const v of unique) {
    // Entry point: white enters on 24-side (point 25-v), black enters on 1-side (point v)
    const entryPt = color === WHITE ? (25 - v) : v;
    const toIdx = pt2idx(entryPt);
    if (toIdx >= 0 && toIdx < 24 && canLand(board, toIdx, color)) {
      moves.push({ from: 'bar', to: toIdx, dieValue: v });
    }
  }
  return moves;
}

// Legal moves from a point
function legalMovesFromPoint(board, bar, dice, usedDice, color, fromIdx) {
  if (bar[color] > 0) return []; // must enter from bar first
  const pt = board[fromIdx];
  if (!pt.color || pt.color !== color || pt.count === 0) return [];

  const canBearOff = allInHome(board, bar, color);
  const vals = unusedDiceValues(dice, usedDice);
  const unique = [...new Set(vals)];
  const dir = moveDir(color);
  const moves = [];

  for (const v of unique) {
    const toIdx = fromIdx + dir * v;
    if (toIdx >= 0 && toIdx < 24) {
      if (canLand(board, toIdx, color)) {
        moves.push({ from: fromIdx, to: toIdx, dieValue: v });
      }
    } else if (canBearOff) {
      // Bear off
      const ptNum = idx2pt(fromIdx);
      const homePt = color === WHITE ? ptNum : (25 - ptNum); // distance from bear-off
      if (homePt === v) {
        // Exact bear off
        moves.push({ from: fromIdx, to: 'bearoff', dieValue: v });
      } else if (homePt < v) {
        // Higher die, no checker on higher point
        const higherExists = hasHigherChecker(board, fromIdx, color);
        if (!higherExists) {
          moves.push({ from: fromIdx, to: 'bearoff', dieValue: v });
        }
      }
    }
  }
  return moves;
}

// Does a checker of `color` exist on a higher home point than `fromIdx`?
function hasHigherChecker(board, fromIdx, color) {
  if (color === WHITE) {
    // higher point number = farther from bearing off for white
    for (let i = fromIdx + 1; i <= 5; i++) {
      if (board[i].color === WHITE && board[i].count > 0) return true;
    }
  } else {
    for (let i = fromIdx - 1; i >= 18; i--) {
      if (board[i].color === BLACK && board[i].count > 0) return true;
    }
  }
  return false;
}

// All legal moves for current player
function allLegalMoves(board, bar, dice, usedDice, color) {
  const moves = [];
  if (bar[color] > 0) {
    moves.push(...legalMovesFromBar(board, bar, dice, usedDice, color));
  } else {
    for (let i = 0; i < 24; i++) {
      if (board[i].color === color && board[i].count > 0) {
        moves.push(...legalMovesFromPoint(board, bar, dice, usedDice, color, i));
      }
    }
  }
  // Deduplicate by from+to+dieValue (keep unique)
  const seen = new Set();
  return moves.filter(m => {
    const key = `${m.from}-${m.to}-${m.dieValue}`;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
}

// Apply a move; returns new { board, bar, borneOff, log }
function applyMove(board, bar, borneOff, move, color, dice, usedDice) {
  const b = board.map(p => ({ ...p }));
  const newBar = { ...bar };
  const newBorneOff = { ...borneOff };
  const opp = color === WHITE ? BLACK : WHITE;
  let logMsg = '';

  // Remove from source
  if (move.from === 'bar') {
    newBar[color] = Math.max(0, newBar[color] - 1);
    logMsg = `${color === WHITE ? 'W' : 'B'} enters from bar → pt${idx2pt(move.to)}`;
  } else {
    b[move.from] = { ...b[move.from], count: b[move.from].count - 1 };
    if (b[move.from].count === 0) b[move.from].color = null;
  }

  if (move.to === 'bearoff') {
    newBorneOff[color]++;
    logMsg = `${color === WHITE ? 'W' : 'B'} bears off from pt${idx2pt(move.from)}`;
  } else {
    const dest = b[move.to];
    // Hit?
    if (dest.color === opp && dest.count === 1) {
      newBar[opp]++;
      b[move.to] = { color, count: 1 };
      logMsg = `${color === WHITE ? 'W' : 'B'} hits pt${idx2pt(move.to)}!`;
    } else {
      b[move.to] = { color, count: (dest.color === color ? dest.count : 0) + 1 };
      if (!logMsg) logMsg = `${color === WHITE ? 'W' : 'B'} ${move.from === 'bar' ? 'bar' : 'pt'+idx2pt(move.from)} → pt${idx2pt(move.to)}`;
    }
  }

  // Mark die used: find first unused die with this value
  const newUsed = [...usedDice];
  for (let i = 0; i < dice.length; i++) {
    if (dice[i] === move.dieValue && !newUsed.includes(i)) {
      newUsed.push(i);
      break;
    }
  }

  return { board: b, bar: newBar, borneOff: newBorneOff, usedDice: newUsed, logMsg };
}

function checkWinner(borneOff) {
  if (borneOff.white === 15) return WHITE;
  if (borneOff.black === 15) return BLACK;
  return null;
}

// ============================================================
// COMPONENTS
// ============================================================

const DICE_FACES = ['', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

function Die({ value, used }) {
  return (
    <div className={`die${used ? ' used' : ''}`} title={used ? '使用済み' : ''}>
      {DICE_FACES[value]}
    </div>
  );
}

function Checker({ color, count, stacked }) {
  return (
    <div className={`checker ${color}${stacked ? ' stacked' : ''}`}>
      {count > 1 ? count : ''}
    </div>
  );
}

// Render checkers on a point (up = top half, dn = bottom half)
function PointCheckers({ point, dir }) {
  if (!point.color || point.count === 0) return null;
  const cls = dir === 'up' ? 'checkers-up' : 'checkers-dn';
  // Show up to 5 individual, then stacked with count
  const show = Math.min(point.count, 5);
  return (
    <div className={cls}>
      {Array.from({ length: show }).map((_, i) => (
        <Checker
          key={i}
          color={point.color}
          count={i === show - 1 && point.count > 5 ? point.count : (i === 0 ? '' : '')}
          stacked={i > 0}
        />
      ))}
      {point.count > 5 && (
        <div style={{ fontSize: '0.7rem', color: '#f0c040', fontWeight: 'bold', zIndex: 11, position: 'relative' }}>
          ×{point.count}
        </div>
      )}
    </div>
  );
}

function BearOffTray({ color, count }) {
  return (
    <div className="bearoff-col">
      <div className="bearoff-label">{color === WHITE ? 'W' : 'B'}</div>
      <div className="bearoff-count">{count}</div>
      <div className="bearoff-pips">
        {Array.from({ length: Math.min(count, 8) }).map((_, i) => (
          <div key={i} style={{
            width: 30, height: 10, borderRadius: 5,
            background: color === WHITE ? '#ddd' : '#333',
            border: '1px solid rgba(255,255,255,0.2)',
          }} />
        ))}
        {count > 8 && <div style={{ fontSize: '0.65rem', color: '#aaa' }}>+{count - 8}</div>}
      </div>
    </div>
  );
}

// ============================================================
// BOARD LAYOUT
//
// Visual layout (standard orientation):
//   Top row    : points 13→18 (left half) | 19→24 (right half)  ← Black's outer/inner
//   Bottom row : points 12→7  (left half) | 6→1   (right half)  ← White's inner/outer
//
// Black moves left→right (1→24), White moves right→left (24→1)
// ============================================================

function Board({ gameState, onPointClick, onBarClick, legalMoves }) {
  const { board, bar, borneOff, currentPlayer, selected } = gameState;

  // Compute sets for highlight
  const legalFromSet = useMemo(() => {
    const s = new Set();
    legalMoves.forEach(m => {
      if (m.from !== 'bar') s.add(m.from);
    });
    return s;
  }, [legalMoves]);

  const legalToSet = useMemo(() => {
    const s = new Set();
    if (selected !== null) {
      legalMoves
        .filter(m => m.from === selected)
        .forEach(m => { if (m.to !== 'bearoff') s.add(m.to); });
    }
    return s;
  }, [legalMoves, selected]);

  const canBearOff = useMemo(() => {
    if (selected === null) return false;
    return legalMoves.some(m => m.from === selected && m.to === 'bearoff');
  }, [legalMoves, selected]);

  // top row: pts 13..18 then 19..24  (indices 12..17, 18..23)
  const topLeft  = [12, 13, 14, 15, 16, 17]; // pt 13-18
  const topRight = [18, 19, 20, 21, 22, 23]; // pt 19-24
  // bottom row: pts 12..7 then 6..1  (indices 11..6, 5..0)
  const botLeft  = [11, 10, 9, 8, 7, 6];     // pt 12-7
  const botRight = [5, 4, 3, 2, 1, 0];       // pt 6-1

  const renderPoint = (idx, dir) => {
    const ptNum = idx2pt(idx);
    const color = (ptNum % 2 === 1) ? 'red' : 'cream'; // alternating
    const isSelected = selected === idx;
    const isLegalFrom = !selected && legalFromSet.has(idx);
    const isLegalTo   = selected !== null && legalToSet.has(idx);

    return (
      <div
        key={idx}
        className="point-cell"
        onClick={() => onPointClick(idx)}
        title={`Point ${ptNum}`}
      >
        <div className={`tri ${dir} ${color}`} />
        {(isSelected || isLegalFrom || isLegalTo) && (
          <div className={`pt-overlay ${isSelected ? 'pt-selected' : 'pt-highlight'}`} />
        )}
        <div className={`pt-num ${dir}`}>{ptNum}</div>
        <PointCheckers point={board[idx]} dir={dir} />
      </div>
    );
  };

  const barCanEnter = legalMoves.some(m => m.from === 'bar');
  const bearOffWhiteHighlight = canBearOff && currentPlayer === WHITE;
  const bearOffBlackHighlight = canBearOff && currentPlayer === BLACK;

  // Also highlight bear-off when a checker in home is selected
  const selectedHasBearOff = selected !== null && legalMoves.some(m => m.from === selected && m.to === 'bearoff');

  return (
    <div className="board-shell">
      {/* Left half */}
      <div className="board-half">
        <div className="half-top">{topLeft.map(i => renderPoint(i, 'up'))}</div>
        <div className="mid-spacer" style={{ width: 52*6 }}>— — —</div>
        <div className="half-bot">{botLeft.map(i => renderPoint(i, 'dn'))}</div>
      </div>

      {/* Bar */}
      <div
        className={`bar-col${barCanEnter ? ' can-enter' : ''}`}
        onClick={onBarClick}
        title="バー（Bar）"
      >
        <div className="bar-section-top">
          <div className="bar-label">BAR</div>
          {bar.black > 0 && <Checker color="black" count={bar.black} />}
        </div>
        <div className="bar-section-bot">
          {bar.white > 0 && <Checker color="white" count={bar.white} />}
          <div className="bar-label">BAR</div>
        </div>
      </div>

      {/* Right half */}
      <div className="board-half">
        <div className="half-top">{topRight.map(i => renderPoint(i, 'up'))}</div>
        <div className="mid-spacer" style={{ width: 52*6 }}>— — —</div>
        <div className="half-bot">{botRight.map(i => renderPoint(i, 'dn'))}</div>
      </div>

      {/* Bear-off trays */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        <BearOffTray color={BLACK} count={borneOff.black} />
        <div
          style={{
            flex: 1,
            background: selectedHasBearOff && currentPlayer === BLACK ? 'rgba(255,220,0,0.25)' : 'transparent',
            border: selectedHasBearOff && currentPlayer === BLACK ? '2px dashed #f0c040' : '2px solid transparent',
            borderRadius: 4,
            cursor: selectedHasBearOff && currentPlayer === BLACK ? 'pointer' : 'default',
            transition: 'all 0.15s',
          }}
          onClick={() => selectedHasBearOff && currentPlayer === BLACK && onPointClick('bearoff')}
          title="Black bear-off"
        />
        <div
          style={{
            flex: 1,
            background: selectedHasBearOff && currentPlayer === WHITE ? 'rgba(255,220,0,0.25)' : 'transparent',
            border: selectedHasBearOff && currentPlayer === WHITE ? '2px dashed #f0c040' : '2px solid transparent',
            borderRadius: 4,
            cursor: selectedHasBearOff && currentPlayer === WHITE ? 'pointer' : 'default',
            transition: 'all 0.15s',
          }}
          onClick={() => selectedHasBearOff && currentPlayer === WHITE && onPointClick('bearoff')}
          title="White bear-off"
        />
        <BearOffTray color={WHITE} count={borneOff.white} />
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [gs, setGs] = useState({ ...INITIAL_STATE, board: INITIAL_BOARD.map(p => ({ ...p })) });

  // Compute legal moves for current state
  const legalMoves = useMemo(() => {
    if (gs.phase !== 'move') return [];
    const src = gs.bar[gs.currentPlayer] > 0 ? 'bar' : null;
    return allLegalMoves(gs.board, gs.bar, gs.dice, gs.usedDice, gs.currentPlayer);
  }, [gs]);

  const handleRoll = useCallback(() => {
    if (gs.phase !== 'roll') return;
    const dice = rollDice();
    const moves = allLegalMoves(gs.board, gs.bar, dice, [], gs.currentPlayer);
    const newLog = [`${gs.currentPlayer === WHITE ? 'ホワイト' : 'ブラック'} がサイコロを振りました: [${dice.join(', ')}]`, ...gs.log.slice(0, 29)];
    if (moves.length === 0) {
      // No moves → skip turn
      const nextPlayer = gs.currentPlayer === WHITE ? BLACK : WHITE;
      setGs(prev => ({
        ...prev,
        dice,
        usedDice: dice.map((_, i) => i), // all used
        phase: 'roll',
        currentPlayer: nextPlayer,
        selected: null,
        log: [`手がありません。ターンをスキップ`, ...newLog],
      }));
    } else {
      setGs(prev => ({
        ...prev,
        dice,
        usedDice: [],
        phase: 'move',
        selected: null,
        log: newLog,
      }));
    }
  }, [gs]);

  const handleEndTurn = useCallback(() => {
    if (gs.phase !== 'move') return;
    const nextPlayer = gs.currentPlayer === WHITE ? BLACK : WHITE;
    setGs(prev => ({
      ...prev,
      currentPlayer: nextPlayer,
      dice: [],
      usedDice: [],
      phase: 'roll',
      selected: null,
    }));
  }, [gs]);

  const doMove = useCallback((move) => {
    const { board, bar, borneOff, usedDice, logMsg } = applyMove(
      gs.board, gs.bar, gs.borneOff, move, gs.currentPlayer, gs.dice, gs.usedDice
    );
    const winner = checkWinner(borneOff);
    const newLog = [logMsg, ...gs.log.slice(0, 29)];

    if (winner) {
      setGs(prev => ({ ...prev, board, bar, borneOff, winner, phase: 'gameover', selected: null, log: [`🏆 ${winner === WHITE ? 'ホワイト' : 'ブラック'} の勝ち！`, ...newLog] }));
      return;
    }

    // Check remaining moves
    const newUsed = usedDice;
    const remaining = allLegalMoves(board, bar, gs.dice, newUsed, gs.currentPlayer);

    if (newUsed.length === gs.dice.length || remaining.length === 0) {
      // Turn ends
      const nextPlayer = gs.currentPlayer === WHITE ? BLACK : WHITE;
      setGs(prev => ({
        ...prev, board, bar, borneOff,
        usedDice: newUsed,
        currentPlayer: nextPlayer,
        dice: [], usedDice: [], phase: 'roll',
        selected: null, log: newLog,
      }));
    } else {
      setGs(prev => ({
        ...prev, board, bar, borneOff,
        usedDice: newUsed,
        selected: null,
        log: newLog,
      }));
    }
  }, [gs]);

  const handlePointClick = useCallback((idx) => {
    if (gs.phase !== 'move') return;

    // Bearoff click
    if (idx === 'bearoff') {
      if (gs.selected === null) return;
      const move = legalMoves.find(m => m.from === gs.selected && m.to === 'bearoff');
      if (move) doMove(move);
      return;
    }

    // If something selected → try to move there
    if (gs.selected !== null) {
      const move = legalMoves.find(m => m.from === gs.selected && m.to === idx);
      if (move) {
        doMove(move);
        return;
      }
      // If clicking own checker → switch selection
      if (gs.board[idx].color === gs.currentPlayer && gs.board[idx].count > 0) {
        const hasMoves = legalMoves.some(m => m.from === idx);
        setGs(prev => ({ ...prev, selected: hasMoves ? idx : null }));
        return;
      }
      // Deselect
      setGs(prev => ({ ...prev, selected: null }));
      return;
    }

    // Nothing selected → try to select
    if (gs.bar[gs.currentPlayer] > 0) return; // must move from bar
    if (gs.board[idx].color !== gs.currentPlayer || gs.board[idx].count === 0) return;
    const hasMoves = legalMoves.some(m => m.from === idx);
    if (hasMoves) setGs(prev => ({ ...prev, selected: idx }));
  }, [gs, legalMoves, doMove]);

  const handleBarClick = useCallback(() => {
    if (gs.phase !== 'move') return;
    if (gs.bar[gs.currentPlayer] === 0) return;
    const hasMoves = legalMoves.some(m => m.from === 'bar');
    if (hasMoves) setGs(prev => ({ ...prev, selected: 'bar' }));
  }, [gs, legalMoves]);

  // Highlight bar when selected
  const gsForBoard = {
    ...gs,
    selected: gs.selected === 'bar' ? null : gs.selected, // board doesn't handle bar selection visually here
  };

  // Remaining dice display
  const diceDisplay = gs.dice.map((v, i) => ({ value: v, used: gs.usedDice.includes(i) }));

  // Can end turn?
  const canEndTurn = gs.phase === 'move' && legalMoves.length === 0;

  const handleReset = () => setGs({ ...INITIAL_STATE, board: INITIAL_BOARD.map(p => ({ ...p })) });

  const playerLabel = (p) => p === WHITE
    ? <span className="col-white">⬜ ホワイト</span>
    : <span className="col-black">⬛ ブラック</span>;

  const barSelected = gs.selected === 'bar';
  const barLegalTos = barSelected
    ? new Set(legalMoves.filter(m => m.from === 'bar').map(m => m.to))
    : new Set();

  // Pass a modified legalMoves to Board that includes bar-source destinations
  const boardLegalMoves = barSelected
    ? legalMoves.filter(m => m.from === 'bar')
    : legalMoves;

  const boardGS = {
    ...gs,
    selected: barSelected ? null : gs.selected,
  };

  // For bar highlight, patch legalMoves destinations onto board when bar selected
  const effectiveLegalMoves = barSelected
    ? legalMoves.map(m => ({ ...m, from: -999 })) // trick: no point selected, but we want 'to' highlighted
    : legalMoves;

  // Actually let's just pass a helper
  const barDestSet = useMemo(() => {
    if (gs.selected !== 'bar') return new Set();
    return new Set(legalMoves.filter(m => m.from === 'bar').map(m => m.to));
  }, [gs.selected, legalMoves]);

  // statusMessage
  let statusMsg = '';
  if (gs.phase === 'roll') {
    statusMsg = 'サイコロを振ってください';
  } else if (gs.phase === 'move') {
    if (gs.bar[gs.currentPlayer] > 0) {
      statusMsg = `バーにコマがあります。バーから入れてください（${gs.bar[gs.currentPlayer]}個）`;
    } else if (gs.selected !== null && gs.selected !== 'bar') {
      const moves = legalMoves.filter(m => m.from === gs.selected);
      statusMsg = `Point ${idx2pt(gs.selected)} を選択中。移動先を選んでください`;
    } else if (barSelected) {
      statusMsg = `バーのコマを選択中。移動先を選んでください`;
    } else {
      statusMsg = `コマを選んで移動してください`;
    }
    if (canEndTurn) statusMsg = '移動できる手がありません。ターン終了を押してください';
  }

  return (
    <div>
      <h1>🎲 バックギャモン</h1>

      {/* Status */}
      <div className="status-bar">
        <div className="status-turn">
          {gs.phase === 'gameover'
            ? <>{playerLabel(gs.winner)} の勝利！🎉</>
            : <>現在のターン: {playerLabel(gs.currentPlayer)}</>
          }
        </div>
        <div className="status-msg">{statusMsg}</div>
      </div>

      {/* Board */}
      <BoardWithBarDests
        gameState={boardGS}
        onPointClick={handlePointClick}
        onBarClick={handleBarClick}
        legalMoves={legalMoves}
        barSelected={barSelected}
        barDestSet={barDestSet}
      />

      {/* Dice */}
      <div className="dice-row">
        {diceDisplay.length > 0
          ? diceDisplay.map((d, i) => <Die key={i} value={d.value} used={d.used} />)
          : <span style={{ color: '#555', fontSize: '0.85rem' }}>サイコロ待ち</span>
        }
      </div>

      {/* Buttons */}
      <div className="btn-row">
        <button
          className="btn-primary"
          onClick={handleRoll}
          disabled={gs.phase !== 'roll'}
        >
          🎲 サイコロを振る
        </button>
        <button
          className="btn-secondary"
          onClick={handleEndTurn}
          disabled={!canEndTurn}
        >
          ターン終了
        </button>
        <button className="btn-danger" onClick={handleReset}>
          🔄 リセット
        </button>
      </div>

      {/* Log */}
      <div className="log">
        {gs.log.map((entry, i) => (
          <div key={i} className="log-entry">{entry}</div>
        ))}
        {gs.log.length === 0 && <span>ゲームログ</span>}
      </div>

      {/* Winner overlay */}
      {gs.winner && (
        <div className="overlay">
          <div className="winner-box">
            <h2>🎉 {gs.winner === WHITE ? 'ホワイト' : 'ブラック'} の勝利！</h2>
            <p>おめでとうございます！</p>
            <button className="btn-primary" onClick={handleReset}>
              もう一度プレイ
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// Board wrapper that handles bar-selection destination highlights
function BoardWithBarDests({ gameState, onPointClick, onBarClick, legalMoves, barSelected, barDestSet }) {
  const { board, bar, borneOff, currentPlayer, selected } = gameState;

  const legalFromSet = useMemo(() => {
    if (barSelected) return new Set();
    const s = new Set();
    legalMoves.forEach(m => { if (m.from !== 'bar') s.add(m.from); });
    return s;
  }, [legalMoves, barSelected]);

  const legalToSet = useMemo(() => {
    if (barSelected) return barDestSet;
    if (selected === null) return new Set();
    const s = new Set();
    legalMoves.filter(m => m.from === selected).forEach(m => { if (m.to !== 'bearoff') s.add(m.to); });
    return s;
  }, [legalMoves, selected, barSelected, barDestSet]);

  const selectedHasBearOff = !barSelected && selected !== null &&
    legalMoves.some(m => m.from === selected && m.to === 'bearoff');

  const topLeft  = [12, 13, 14, 15, 16, 17];
  const topRight = [18, 19, 20, 21, 22, 23];
  const botLeft  = [11, 10, 9, 8, 7, 6];
  const botRight = [5, 4, 3, 2, 1, 0];

  const renderPoint = (idx, dir) => {
    const ptNum = idx2pt(idx);
    const triColor = (idx % 2 === 0) ? 'red' : 'cream';
    const isSelected = selected === idx;
    const isLegalFrom = !barSelected && !selected && legalFromSet.has(idx);
    const isLegalTo   = legalToSet.has(idx);

    return (
      <div
        key={idx}
        className="point-cell"
        onClick={() => onPointClick(idx)}
        title={`Point ${ptNum}`}
      >
        <div className={`tri ${dir} ${triColor}`} />
        {(isSelected || isLegalFrom || isLegalTo) && (
          <div className={`pt-overlay ${isSelected ? 'pt-selected' : 'pt-highlight'}`} />
        )}
        <div className={`pt-num ${dir}`}>{ptNum}</div>
        <PointCheckers point={board[idx]} dir={dir} />
      </div>
    );
  };

  const barCanEnter = legalMoves.some(m => m.from === 'bar');

  return (
    <div className="board-shell">
      <div className="board-half">
        <div className="half-top">{topLeft.map(i => renderPoint(i, 'up'))}</div>
        <div className="mid-spacer" style={{ width: 52 * 6 }}>— — —</div>
        <div className="half-bot">{botLeft.map(i => renderPoint(i, 'dn'))}</div>
      </div>

      <div
        className={`bar-col${barCanEnter || barSelected ? ' can-enter' : ''}`}
        onClick={onBarClick}
        title="バー（Bar）"
        style={barSelected ? { background: '#b08040' } : {}}
      >
        <div className="bar-section-top">
          <div className="bar-label">BAR</div>
          {bar.black > 0 && <Checker color="black" count={bar.black} />}
        </div>
        <div className="bar-section-bot">
          {bar.white > 0 && <Checker color="white" count={bar.white} />}
          <div className="bar-label">BAR</div>
        </div>
      </div>

      <div className="board-half">
        <div className="half-top">{topRight.map(i => renderPoint(i, 'up'))}</div>
        <div className="mid-spacer" style={{ width: 52 * 6 }}>— — —</div>
        <div className="half-bot">{botRight.map(i => renderPoint(i, 'dn'))}</div>
      </div>

      {/* Bear-off trays */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4, minWidth: 52 }}>
        <BearOffTray color={BLACK} count={borneOff.black} />
        <div
          style={{
            flex: 1,
            background: selectedHasBearOff && currentPlayer === BLACK ? 'rgba(255,220,0,0.25)' : '#1a3a09',
            border: selectedHasBearOff && currentPlayer === BLACK ? '2px dashed #f0c040' : '2px solid transparent',
            borderRadius: 4,
            cursor: selectedHasBearOff && currentPlayer === BLACK ? 'pointer' : 'default',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: '0.6rem', color: '#555',
            transition: 'all 0.15s',
          }}
          onClick={() => onPointClick('bearoff')}
          title="ベアオフ（Black）"
        >
          {selectedHasBearOff && currentPlayer === BLACK ? '↑OUT' : ''}
        </div>
        <div
          style={{
            flex: 1,
            background: selectedHasBearOff && currentPlayer === WHITE ? 'rgba(255,220,0,0.25)' : '#1a3a09',
            border: selectedHasBearOff && currentPlayer === WHITE ? '2px dashed #f0c040' : '2px solid transparent',
            borderRadius: 4,
            cursor: selectedHasBearOff && currentPlayer === WHITE ? 'pointer' : 'default',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: '0.6rem', color: '#555',
            transition: 'all 0.15s',
          }}
          onClick={() => onPointClick('bearoff')}
          title="ベアオフ（White）"
        >
          {selectedHasBearOff && currentPlayer === WHITE ? '↓OUT' : ''}
        </div>
        <BearOffTray color={WHITE} count={borneOff.white} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
