<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バックギャモン</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 16px; transition: background 0.4s, color 0.4s; }

/* ── layout ── */
.point-cell { position: relative; width: 52px; height: 192px; cursor: pointer; overflow: visible; }
.tri { position: absolute; width: 0; height: 0; border-left: 26px solid transparent; border-right: 26px solid transparent; pointer-events: none; }
.pt-overlay { position: absolute; inset: 0; z-index: 5; pointer-events: none; border-radius: 2px; }
.pt-highlight { background: rgba(255,255,255,0.16); }
.pt-selected  { background: rgba(255,220,0,0.30); }
.pt-num { position: absolute; left: 0; right: 0; text-align: center; font-size: 0.58rem; z-index: 6; pointer-events: none; opacity: 0.5; }
.pt-num.up { bottom: 2px; } .pt-num.dn { top: 2px; }
.checkers-up { position: absolute; top: 4px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 1px; z-index: 10; }
.checkers-dn { position: absolute; bottom: 4px; left: 0; right: 0; display: flex; flex-direction: column-reverse; align-items: center; gap: 1px; z-index: 10; }
.checker { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: bold; flex-shrink: 0; cursor: pointer; transition: transform 0.1s; position: relative; z-index: 10; }
.checker:hover { transform: scale(1.08); }
.checker.stacked { width: 38px; height: 38px; margin-top: -10px; }
.board-shell { display: flex; flex-direction: row; align-items: stretch; gap: 4px; padding: 4px; border-radius: 6px; }
.board-half { display: flex; flex-direction: column; }
.half-top, .half-bot { display: flex; flex-direction: row; }
.mid-spacer { height: 28px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; }
.bar-col { width: 44px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: background 0.15s; border-radius: 3px; }
.bar-section-top { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 6px; gap: 2px; }
.bar-section-bot { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; gap: 2px; }
.bar-label { font-size: 0.5rem; writing-mode: vertical-rl; padding: 4px 0; }
.bearoff-col { width: 48px; display: flex; flex-direction: column; align-items: center; border-radius: 3px; padding: 4px 2px; gap: 2px; }
.bearoff-label { font-size: 0.58rem; } .bearoff-count { font-size: 1.1rem; font-weight: bold; }
.bearoff-pips { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; justify-content: flex-start; width: 100%; }
.dice-row { display: flex; gap: 10px; align-items: center; justify-content: center; margin: 10px 0; flex-wrap: wrap; }
.die { width: 46px; height: 46px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; transition: opacity 0.25s; }
.die.used { opacity: 0.22; }
.status-bar { border-radius: 8px; padding: 10px 24px; margin-bottom: 10px; text-align: center; width: 100%; max-width: 780px; }
.status-turn { font-size: 1rem; font-weight: bold; } .status-msg { font-size: 0.82rem; margin-top: 3px; min-height: 1.2em; opacity: 0.7; }
.btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 6px; }
button { padding: 8px 22px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; font-weight: bold; transition: opacity 0.18s, background 0.18s; }
button:disabled { opacity: 0.3; cursor: not-allowed; }
.log { border-radius: 8px; padding: 6px 12px; margin-top: 10px; width: 100%; max-width: 780px; max-height: 72px; overflow-y: auto; font-size: 0.72rem; }
.log-entry { border-bottom: 1px solid rgba(255,255,255,0.06); padding: 1px 0; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.82); display: flex; align-items: center; justify-content: center; z-index: 100; }
.winner-box { border-radius: 14px; padding: 44px 64px; text-align: center; }
.winner-box h2 { font-size: 2rem; margin-bottom: 10px; } .winner-box p { margin-bottom: 28px; opacity: 0.7; }

/* ── theme picker ── */
.theme-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 32px; }
.theme-cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.theme-card { width: 200px; border-radius: 12px; padding: 24px 16px; text-align: center; cursor: pointer; transition: transform 0.18s, box-shadow 0.18s; border: 2px solid transparent; }
.theme-card:hover { transform: translateY(-6px); }
.theme-card-icon { font-size: 2.8rem; margin-bottom: 10px; }
.theme-card-name { font-size: 1rem; font-weight: bold; letter-spacing: 2px; margin-bottom: 6px; }
.theme-card-desc { font-size: 0.75rem; opacity: 0.6; line-height: 1.6; }
.theme-swatch { display: flex; gap: 5px; justify-content: center; margin-top: 12px; }
.theme-swatch-dot { width: 14px; height: 14px; border-radius: 50%; }
.start-btn { padding: 14px 48px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; letter-spacing: 2px; transition: opacity 0.2s, transform 0.15s; }
.start-btn:hover { transform: scale(1.04); opacity: 0.9; }

/* ══════════════════════════════════
   RETRO THEME
══════════════════════════════════ */
body.t-retro { background: #EDE0B8; color: #3A1800; font-family: Georgia, serif; }
body.t-retro .status-bar { background: #D4C090; border: 2px solid #8B3A10; }

body.t-retro .bar-label { color: rgba(240,220,180,0.6); }
body.t-retro .bearoff-col { background: #9A7020; } .t-retro .bearoff-label { color: #E8C870; } .t-retro .bearoff-count { color: #FFD700; }
body.t-retro .pt-num { color: rgba(58,24,0,0.7); }
body.t-retro .tri.up.tA { border-top:    186px solid #8B3A10; }
body.t-retro .tri.up.tB { border-top:    186px solid #E8C840; }
body.t-retro .tri.dn.tA { border-bottom: 186px solid #8B3A10; }
body.t-retro .tri.dn.tB { border-bottom: 186px solid #E8C840; }
body.t-retro .checker.white { background: #F5F0E0; border: 3px solid #8B3A10; color: #3A1800; }
body.t-retro .checker.black { background: #3A1800; border: 3px solid #C4A24A; color: #FFD700; }
body.t-retro .btn-primary   { background: #8B3A10; color: #F5F0E0; }
body.t-retro .btn-secondary { background: #C4A24A; color: #3A1800; }

body.t-retro button:hover:not(:disabled) { opacity: 0.82; }

/* ══════════════════════════════════
   LOFI THEME
══════════════════════════════════ */
body.t-lofi { background: #1E1E24; color: #C8B898; font-family: 'Helvetica Neue', sans-serif; }
body.t-lofi .status-bar { background: #28282F; border: 1px solid #4A4A5A; }
body.t-lofi .status-turn { color: #D8C8A8; }
body.t-lofi .log { background: #28282F; border: 1px solid #3A3A4A; color: #888; }
body.t-lofi .winner-box { background: #2C2C34; border: 1px solid #7A8C6A; }
body.t-lofi .winner-box h2 { color: #B8D898; }
body.t-lofi .die { background: #2A2818; color: #D8C8A8; border: 1px solid #7A8C6A; border-radius: 6px; }
body.t-lofi .board-shell { background: #3A3028; border: 3px solid #4A4A3A; }
body.t-lofi .mid-spacer { background: #2A2018; color: #5A5A4A; }
body.t-lofi .bar-col { background: #2A2018; } .t-lofi .bar-col.can-enter { background: #4A4038; }
body.t-lofi .bar-label { color: rgba(200,180,150,0.3); }
body.t-lofi .bearoff-col { background: #222018; } .t-lofi .bearoff-label { color: #6A6A5A; } .t-lofi .bearoff-count { color: #B8D898; }
body.t-lofi .pt-num { color: rgba(200,184,152,0.6); }
/* G修正: 薄かった色をテラコッタ(#C8704A)に変更 → 両色ともコントラスト確保 */
body.t-lofi .tri.up.tA { border-top:    186px solid #7A8C6A; }
body.t-lofi .tri.up.tB { border-top:    186px solid #C8704A; }
body.t-lofi .tri.dn.tA { border-bottom: 186px solid #7A8C6A; }
body.t-lofi .tri.dn.tB { border-bottom: 186px solid #C8704A; }
body.t-lofi .checker.white { background: #D8C8A8; border: 2px solid #A89878; color: #2A1800; }
body.t-lofi .checker.black { background: #5A4838; border: 2px solid #9A8868; color: #E8D8B8; }
body.t-lofi .btn-primary   { background: #7A8C6A; color: #1E1E24; }
body.t-lofi .btn-secondary { background: #3A3028; color: #C8B898; border: 1px solid #5A5A4A; }
body.t-lofi .btn-danger    { background: #6A3020; color: #D8C8A8; }
body.t-lofi button:hover:not(:disabled) { opacity: 0.80; }

/* ══════════════════════════════════
   CYBER THEME
══════════════════════════════════ */
body.t-cyber { background: #050510; color: #00FFFF; font-family: 'Courier New', monospace; }
body.t-cyber .status-bar { background: #080820; border: 1px solid #00FFFF; border-radius: 2px; }
body.t-cyber .status-turn { color: #00FFFF; letter-spacing: 2px; }
body.t-cyber .log { background: #080820; border: 1px solid #FF00FF44; color: #00FFFF88; border-radius: 2px; }
body.t-cyber .winner-box { background: #080820; border: 2px solid #FF00FF; border-radius: 4px; }
body.t-cyber .winner-box h2 { color: #FF00FF; letter-spacing: 3px; }
body.t-cyber .die { background: #080820; color: #FFFF00; border: 1.5px solid #FFFF00; border-radius: 2px; box-shadow: 0 0 8px #FFFF0055; }
body.t-cyber .board-shell { background: #050510; border: 2px solid #FF00FF55; border-radius: 2px; box-shadow: 0 0 24px #FF00FF22; }
body.t-cyber .mid-spacer { background: #0A0520; color: #00FFFF33; }
body.t-cyber .bar-col { background: #0A0520; } .t-cyber .bar-col.can-enter { background: #160840; }
body.t-cyber .bar-label { color: rgba(255,255,0,0.4); }
body.t-cyber .bearoff-col { background: #080820; border: 1px solid #00FFFF33; border-radius: 1px; }
body.t-cyber .bearoff-label { color: #00FFFF88; } .t-cyber .bearoff-count { color: #00FFFF; }
body.t-cyber .pt-num { color: #00FFFF99; }
/* H修正: どちらも明度の高いビビッドな色 + 黒文字で視認性確保 */
body.t-cyber .tri.up.tA { border-top:    186px solid #006688; }

body.t-cyber .tri.dn.tA { border-bottom: 186px solid #006688; }
body.t-cyber .tri.dn.tB { border-bottom: 186px solid #770055; }
/* コマ: 白=明るいシアン(#00FFEE)黒文字 / 黒=明るいマゼンタ(#FF44CC)黒文字 → 両方くっきり */
body.t-cyber .checker.white { background: #00FFEE; border: 2px solid #FFFFFF; color: #000; box-shadow: 0 0 10px #00FFEE88; }
body.t-cyber .checker.black { background: #FF44CC; border: 2px solid #FFFFFF; color: #000; box-shadow: 0 0 10px #FF44CC88; }
body.t-cyber .btn-primary   { background: #080820; color: #FF00FF; border: 1.5px solid #FF00FF; border-radius: 2px; letter-spacing: 2px; box-shadow: 0 0 8px #FF00FF44; }
body.t-cyber .btn-secondary { background: #080820; color: #00FFFF; border: 1.5px solid #00FFFF44; border-radius: 2px; }

body.t-cyber button:hover:not(:disabled) { opacity: 0.72; }
body.t-cyber h1 { letter-spacing: 6px; }
</style>

<body class="t-retro">
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo } = React;

/* ── THEME DEFINITIONS ── */
const THEMES = {
  retro: { key:'retro', cls:'t-retro', name:'RETRO CHIC', icon:'🎞️', desc:'70sポスター風\nマスタード × ラスト', swatches:['#8B3A10','#E8C840','#F5F0E0','#C4A24A'] },
  lofi:  { key:'lofi',  cls:'t-lofi',  name:'LO-FI CHILL', icon:'🎧', desc:'ダーク × アースカラー\n小洒落た落ち着き感', swatches:['#7A8C6A','#C8704A','#D8C8A8','#5A4838'] },
  cyber: { key:'cyber', cls:'t-cyber', name:'CYBERPUNK',   icon:'⚡', desc:'ネオン × ダーク\nサイバーパンクビビッド', swatches:['#00FFEE','#FF44CC','#FFFF00','#FF00FF'] },
};

/* ── GAME CONSTANTS ── */
const WHITE = 'white', BLACK = 'black';
const mkBoard = () => {
  const b = Array.from({length:24}, () => ({color:null,count:0}));
  b[23]={color:WHITE,count:2}; b[12]={color:WHITE,count:5};
  b[7] ={color:WHITE,count:3}; b[5] ={color:WHITE,count:5};
  b[0] ={color:BLACK,count:2}; b[11]={color:BLACK,count:5};
  b[16]={color:BLACK,count:3}; b[18]={color:BLACK,count:5};
  return b;
};
const INIT = {board:mkBoard(),bar:{white:0,black:0},borneOff:{white:0,black:0},currentPlayer:WHITE,dice:[],usedDice:[],phase:'roll',selected:null,winner:null,log:[]};

/* ── GAME LOGIC ── */
const idx2pt = i => i+1;
const rollDice = () => { const a=~~(Math.random()*6)+1,b=~~(Math.random()*6)+1; return a===b?[a,a,a,a]:[a,b]; };
const isInHome = (i,c) => c===WHITE ? i<=5 : i>=18;
const allInHome = (board,bar,c) => {
  if(bar[c]>0) return false;
  for(let i=0;i<24;i++) if(board[i].color===c&&board[i].count>0&&!isInHome(i,c)) return false;
  return true;
};
const canLand = (board,to,c) => { const p=board[to]; return !p.color||p.color===c||p.count===1; };
const unusedVals = (dice,used) => {
  const cp=[...used], r=[];
  for(let i=0;i<dice.length;i++){ const p=cp.indexOf(i); if(p===-1) r.push(dice[i]); else cp.splice(p,1); }
  return r;
};
const hasHigher = (board,from,c) => {
  if(c===WHITE){ for(let i=from+1;i<=5;i++) if(board[i].color===WHITE&&board[i].count>0) return true; }
  else { for(let i=from-1;i>=18;i--) if(board[i].color===BLACK&&board[i].count>0) return true; }
  return false;
};
const movesFromBar = (board,dice,used,c) => {
  return [...new Set(unusedVals(dice,used))].flatMap(v => {
    const to = (c===WHITE?25-v:v)-1;
    return to>=0&&to<24&&canLand(board,to,c) ? [{from:'bar',to,dieValue:v}] : [];
  });
};
const movesFromPt = (board,bar,dice,used,c,from) => {
  if(bar[c]>0) return [];
  const pt=board[from]; if(!pt.color||pt.color!==c||!pt.count) return [];
  const bearOk=allInHome(board,bar,c), dir=c===WHITE?-1:1, moves=[];
  for(const v of [...new Set(unusedVals(dice,used))]) {
    const to=from+dir*v;
    if(to>=0&&to<24) { if(canLand(board,to,c)) moves.push({from,to,dieValue:v}); }
    else if(bearOk) {
      const hp=c===WHITE?idx2pt(from):(25-idx2pt(from));
      if(hp===v) moves.push({from,to:'bearoff',dieValue:v});
      else if(hp<v&&!hasHigher(board,from,c)) moves.push({from,to:'bearoff',dieValue:v});
    }
  }
  return moves;
};
const allMoves = (board,bar,dice,used,c) => {
  const raw = bar[c]>0 ? movesFromBar(board,dice,used,c)
    : Array.from({length:24},(_,i)=>i).flatMap(i=>movesFromPt(board,bar,dice,used,c,i));
  const seen=new Set();
  return raw.filter(m=>{ const k=`${m.from}-${m.to}-${m.dieValue}`; if(seen.has(k)) return false; seen.add(k); return true; });
};
const applyMove = (board,bar,borneOff,move,c,dice,used) => {
  const b=board.map(p=>({...p})), nb={...bar}, nbo={...borneOff}, opp=c===WHITE?BLACK:WHITE;
  let msg='';
  if(move.from==='bar') { nb[c]=Math.max(0,nb[c]-1); msg=`${c==='white'?'W':'B'} バー→pt${idx2pt(move.to)}`; }
  else { b[move.from]={...b[move.from],count:b[move.from].count-1}; if(!b[move.from].count) b[move.from].color=null; }
  if(move.to==='bearoff') { nbo[c]++; msg=`${c==='white'?'W':'B'} pt${idx2pt(move.from)} ベアオフ`; }
  else {
    const d=b[move.to];
    if(d.color===opp&&d.count===1){ nb[opp]++; b[move.to]={color:c,count:1}; msg=`${c==='white'?'W':'B'} pt${idx2pt(move.to)} ヒット！`; }
    else { b[move.to]={color:c,count:(d.color===c?d.count:0)+1}; if(!msg) msg=`${c==='white'?'W':'B'} ${move.from==='bar'?'bar':'pt'+idx2pt(move.from)}→pt${idx2pt(move.to)}`; }
  }
  const nu=[...used];
  for(let i=0;i<dice.length;i++) if(dice[i]===move.dieValue&&!nu.includes(i)){nu.push(i);break;}
  return {board:b,bar:nb,borneOff:nbo,usedDice:nu,logMsg:msg};
};
const checkWinner = bo => bo.white===15?WHITE:bo.black===15?BLACK:null;

/* ── COMPONENTS ── */
const FACES = ['','⚀','⚁','⚂','⚃','⚄','⚅'];

function Checker({color,stacked,count}) {
  return <div className={`checker ${color}${stacked?' stacked':''}`}>{count>1?count:''}</div>;
}
function PointCheckers({point,dir}) {
  if(!point.color||!point.count) return null;
  const show=Math.min(point.count,5);
  return (
    <div className={dir==='up'?'checkers-up':'checkers-dn'}>
      {Array.from({length:show},(_,i)=><Checker key={i} color={point.color} stacked={i>0} count={i===show-1&&point.count>5?point.count:''}/>)}
      {point.count>5&&<div style={{fontSize:'0.7rem',fontWeight:'bold',zIndex:11,position:'relative',opacity:.9}}>×{point.count}</div>}
    </div>
  );
}
function BearOffPip({color,theme}) {
  const bg = color===WHITE
    ? (theme==='cyber'?'#00FFEE':theme==='lofi'?'#D8C8A8':'#F0E8C0')
    : (theme==='cyber'?'#FF44CC':theme==='lofi'?'#5A4838':'#3A1800');
  return <div style={{width:28,height:8,borderRadius:4,background:bg,opacity:.85}}/>;
}
function BearOffTray({color,count,theme}) {
  return (
    <div className="bearoff-col">
      <div className="bearoff-label">{color===WHITE?'W':'B'}</div>
      <div className="bearoff-count">{count}</div>
      <div className="bearoff-pips">
        {Array.from({length:Math.min(count,8)},(_,i)=><BearOffPip key={i} color={color} theme={theme}/>)}
        {count>8&&<div style={{fontSize:'0.6rem',opacity:.7}}>+{count-8}</div>}
      </div>
    </div>
  );
}

function Board({gs,onPoint,onBar,legalMoves,barSelected,barDestSet,theme}) {
  const {board,bar,borneOff,currentPlayer,selected} = gs;

  const fromSet = useMemo(()=>{
    if(barSelected) return new Set();
    const s=new Set(); legalMoves.forEach(m=>{if(m.from!=='bar')s.add(m.from);}); return s;
  },[legalMoves,barSelected]);

  const toSet = useMemo(()=>{
    if(barSelected) return barDestSet;
    if(selected===null) return new Set();
    const s=new Set(); legalMoves.filter(m=>m.from===selected).forEach(m=>{if(m.to!=='bearoff')s.add(m.to);}); return s;
  },[legalMoves,selected,barSelected,barDestSet]);

  const hasBearOff = !barSelected&&selected!==null&&legalMoves.some(m=>m.from===selected&&m.to==='bearoff');
  const barCanEnter = legalMoves.some(m=>m.from==='bar');

  const topL=[12,13,14,15,16,17], topR=[18,19,20,21,22,23];
  const botL=[11,10,9,8,7,6],     botR=[5,4,3,2,1,0];

  const renderPt = (idx,dir) => {
    const tc = idx%2===0?'tA':'tB';
    const isSel=selected===idx, isFrom=!barSelected&&!selected&&fromSet.has(idx), isTo=toSet.has(idx);
    return (
      <div key={idx} className="point-cell" onClick={()=>onPoint(idx)} title={`Point ${idx2pt(idx)}`}>
        <div className={`tri ${dir} ${tc}`}/>
        {(isSel||isFrom||isTo)&&<div className={`pt-overlay ${isSel?'pt-selected':'pt-highlight'}`}/>}
        <div className={`pt-num ${dir}`}>{idx2pt(idx)}</div>
        <PointCheckers point={board[idx]} dir={dir}/>
      </div>
    );
  };

  const bearBg = active => active ? 'rgba(255,220,0,0.28)' : (theme==='cyber'?'#0A0520':theme==='lofi'?'#222018':'#9A7020');
  const bearBorder = active => active ? '2px dashed rgba(255,220,50,0.9)' : '2px solid transparent';

  return (
    <div className="board-shell">
      <div className="board-half">
        <div className="half-top">{topL.map(i=>renderPt(i,'up'))}</div>
        <div className="mid-spacer" style={{width:52*6}}>· · ·</div>
        <div className="half-bot">{botL.map(i=>renderPt(i,'dn'))}</div>
      </div>

      <div className={`bar-col${barCanEnter||barSelected?' can-enter':''}`} onClick={onBar}
        style={barSelected?{opacity:.8}:{}} title="バー">
        <div className="bar-section-top">
          <div className="bar-label">BAR</div>
          {bar.black>0&&<Checker color="black" count={bar.black}/>}
        </div>
        <div className="bar-section-bot">
          {bar.white>0&&<Checker color="white" count={bar.white}/>}
          <div className="bar-label">BAR</div>
        </div>
      </div>

      <div className="board-half">
        <div className="half-top">{topR.map(i=>renderPt(i,'up'))}</div>
        <div className="mid-spacer" style={{width:52*6}}>· · ·</div>
        <div className="half-bot">{botR.map(i=>renderPt(i,'dn'))}</div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:4,minWidth:52}}>
        <BearOffTray color={BLACK} count={borneOff.black} theme={theme}/>
        <div style={{flex:1,borderRadius:4,cursor:hasBearOff&&currentPlayer===BLACK?'pointer':'default',background:bearBg(hasBearOff&&currentPlayer===BLACK),border:bearBorder(hasBearOff&&currentPlayer===BLACK),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.6rem',transition:'all .15s'}}
          onClick={()=>onPoint('bearoff')}>
          {hasBearOff&&currentPlayer===BLACK?'↑OUT':''}
        </div>
        <div style={{flex:1,borderRadius:4,cursor:hasBearOff&&currentPlayer===WHITE?'pointer':'default',background:bearBg(hasBearOff&&currentPlayer===WHITE),border:bearBorder(hasBearOff&&currentPlayer===WHITE),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'0.6rem',transition:'all .15s'}}
          onClick={()=>onPoint('bearoff')}>
          {hasBearOff&&currentPlayer===WHITE?'↓OUT':''}
        </div>
        <BearOffTray color={WHITE} count={borneOff.white} theme={theme}/>
      </div>
    </div>
  );
}

/* ── THEME PICKER ── */
function ThemePicker({onStart}) {
  const [sel,setSel] = useState('retro');
  const t = THEMES[sel];

  return (
    <div className="theme-screen">
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'2rem',fontWeight:'bold',letterSpacing:4,
          color:sel==='cyber'?'#00FFFF':sel==='lofi'?'#C8B898':'#8B3A10',
          fontFamily:sel==='cyber'?'Courier New,monospace':sel==='retro'?'Georgia,serif':'inherit',
          textShadow:sel==='cyber'?'0 0 14px #00FFFF':undefined,
        }}>🎲 バックギャモン</div>
        <div style={{fontSize:'0.85rem',opacity:.5,marginTop:6,letterSpacing:3,
          color:sel==='cyber'?'#FF00FF':sel==='lofi'?'#888':'#8B3A10'}}>
          {sel==='cyber'?'SELECT THEME — PRESS START':'テーマを選んでゲームスタート'}
        </div>
      </div>

      <div className="theme-cards">
        {Object.values(THEMES).map(th=>(
          <div key={th.key} className={`theme-card${sel===th.key?' selected':''}`} onClick={()=>setSel(th.key)}
            style={{
              background: th.key==='retro'?'#D4C090':th.key==='lofi'?'#28282F':'#080820',
              color: th.key==='retro'?'#3A1800':th.key==='lofi'?'#C8B898':'#00FFFF',
              borderColor: sel===th.key?(th.key==='retro'?'#8B3A10':th.key==='lofi'?'#7A8C6A':'#FF00FF'):'transparent',
              boxShadow: sel===th.key&&th.key==='cyber'?'0 0 20px #FF00FF55':undefined,
            }}>
            <div className="theme-card-icon">{th.icon}</div>
            <div className="theme-card-name" style={{fontFamily:th.key==='cyber'?'Courier New,monospace':th.key==='retro'?'Georgia,serif':'inherit'}}>{th.name}</div>
            <div className="theme-card-desc">{th.desc.split('\n').map((l,i)=><div key={i}>{l}</div>)}</div>
            <div className="theme-swatch">{th.swatches.map((c,i)=><div key={i} className="theme-swatch-dot" style={{background:c}}/>)}</div>
          </div>
        ))}
      </div>

      <button className="start-btn" onClick={()=>onStart(sel)} style={{
        background: sel==='retro'?'#8B3A10':sel==='lofi'?'#7A8C6A':'#080820',
        color: sel==='retro'?'#F5F0E0':sel==='lofi'?'#1E1E24':'#FF00FF',
        border: sel==='cyber'?'1.5px solid #FF00FF':'none',
        boxShadow: sel==='cyber'?'0 0 16px #FF00FF44':undefined,
        fontFamily: sel==='cyber'?'Courier New,monospace':sel==='retro'?'Georgia,serif':'inherit',
        letterSpacing: sel==='cyber'?4:2,
      }}>
        {sel==='cyber'?'[ GAME START ]':'ゲームスタート →'}
      </button>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [theme,setTheme] = useState(null);
  const [gs,setGs] = useState({...INIT,board:mkBoard()});

  const handleStart = useCallback(t=>{
    document.body.className = THEMES[t].cls;
    setTheme(t);
  },[]);

  const legalMoves = useMemo(()=>{
    if(gs.phase!=='move') return [];
    return allMoves(gs.board,gs.bar,gs.dice,gs.usedDice,gs.currentPlayer);
  },[gs]);

  const handleRoll = useCallback(()=>{
    if(gs.phase!=='roll') return;
    const dice=rollDice();
    const moves=allMoves(gs.board,gs.bar,dice,[],gs.currentPlayer);
    const log=[`${gs.currentPlayer===WHITE?'ホワイト':'ブラック'}: [${dice.join(', ')}]`,...gs.log.slice(0,29)];
    if(!moves.length){
      setGs(p=>({...p,dice,usedDice:dice.map((_,i)=>i),phase:'roll',currentPlayer:p.currentPlayer===WHITE?BLACK:WHITE,selected:null,log:['手なし → スキップ',...log]}));
    } else {
      setGs(p=>({...p,dice,usedDice:[],phase:'move',selected:null,log}));
    }
  },[gs]);

  const handleEndTurn = useCallback(()=>{
    if(gs.phase!=='move') return;
    setGs(p=>({...p,currentPlayer:p.currentPlayer===WHITE?BLACK:WHITE,dice:[],usedDice:[],phase:'roll',selected:null}));
  },[gs]);

  const doMove = useCallback(move=>{
    const {board,bar,borneOff,usedDice,logMsg}=applyMove(gs.board,gs.bar,gs.borneOff,move,gs.currentPlayer,gs.dice,gs.usedDice);
    const winner=checkWinner(borneOff);
    const log=[logMsg,...gs.log.slice(0,29)];
    if(winner){ setGs(p=>({...p,board,bar,borneOff,winner,phase:'gameover',selected:null,log:[`🏆 ${winner===WHITE?'ホワイト':'ブラック'}の勝ち！`,...log]})); return; }
    const rem=allMoves(board,bar,gs.dice,usedDice,gs.currentPlayer);
    if(usedDice.length===gs.dice.length||!rem.length){
      setGs(p=>({...p,board,bar,borneOff,usedDice:[],currentPlayer:p.currentPlayer===WHITE?BLACK:WHITE,dice:[],phase:'roll',selected:null,log}));
    } else {
      setGs(p=>({...p,board,bar,borneOff,usedDice,selected:null,log}));
    }
  },[gs]);

  const handlePoint = useCallback(idx=>{
    if(gs.phase!=='move') return;
    if(idx==='bearoff'){
      if(gs.selected===null) return;
      const m=legalMoves.find(m=>m.from===gs.selected&&m.to==='bearoff');
      if(m) doMove(m); return;
    }
    if(gs.selected!==null){
      const m=legalMoves.find(m=>m.from===gs.selected&&m.to===idx);
      if(m){ doMove(m); return; }
      if(gs.board[idx].color===gs.currentPlayer&&gs.board[idx].count>0){
        const ok=legalMoves.some(m=>m.from===idx);
        setGs(p=>({...p,selected:ok?idx:null})); return;
      }
      setGs(p=>({...p,selected:null})); return;
    }
    if(gs.bar[gs.currentPlayer]>0) return;
    if(gs.board[idx].color!==gs.currentPlayer||!gs.board[idx].count) return;
    if(legalMoves.some(m=>m.from===idx)) setGs(p=>({...p,selected:idx}));
  },[gs,legalMoves,doMove]);

  const handleBar = useCallback(()=>{
    if(gs.phase!=='move'||!gs.bar[gs.currentPlayer]) return;
    if(legalMoves.some(m=>m.from==='bar')) setGs(p=>({...p,selected:'bar'}));
  },[gs,legalMoves]);

  const handleReset = ()=>{ setGs({...INIT,board:mkBoard()}); setTheme(null); document.body.className='t-retro'; };

  const barSel = gs.selected==='bar';
  const barDestSet = useMemo(()=>{
    if(!barSel) return new Set();
    return new Set(legalMoves.filter(m=>m.from==='bar').map(m=>m.to));
  },[barSel,legalMoves]);

  if(!theme) return <ThemePicker onStart={handleStart}/>;

  const canEnd = gs.phase==='move'&&!legalMoves.length;
  const isCyber = theme==='cyber';
  const isRetro = theme==='retro';

  const plLabel = p => {
    const isW=p===WHITE;
    const nameW = isCyber?'CYAN':isRetro?'ホワイト':'ホワイト';
    const nameB = isCyber?'PINK':isRetro?'ブラック':'ブラック';
    return <span style={{color:isW?(isCyber?'#00FFEE':isRetro?'#8B3A10':'#D8C8A8'):(isCyber?'#FF44CC':isRetro?'#6A1800':'#C8704A'),fontWeight:'bold'}}>
      {isW?'⬜':'⬛'} {isW?nameW:nameB}
    </span>;
  };

  let msg='';
  if(gs.phase==='roll') msg=isCyber?'▶ ROLL DICE TO PROCEED':'サイコロを振ってください';
  else if(gs.phase==='move'){
    if(gs.bar[gs.currentPlayer]>0) msg=`バーのコマを入れてください（${gs.bar[gs.currentPlayer]}個）`;
    else if(barSel) msg='バーのコマ選択中 — 移動先を選んでください';
    else if(gs.selected!==null) msg=`pt${idx2pt(gs.selected)} 選択中 — 移動先を選んでください`;
    else msg=isCyber?'▶ SELECT PIECE':'コマを選んで移動してください';
    if(canEnd) msg=isCyber?'▶ NO MOVES — END TURN':'移動できる手がありません。ターン終了を押してください';
  }

  const boardGs={...gs,selected:barSel?null:gs.selected};

  return (
    <div>
      <h1 style={{marginBottom:10,fontSize:'1.4rem',letterSpacing:isCyber?6:3,
        color:isCyber?'#00FFFF':isRetro?'#8B3A10':'#C8B898',
        fontFamily:isCyber?'Courier New,monospace':isRetro?'Georgia,serif':'inherit',
        textShadow:isCyber?'0 0 12px #00FFFF':undefined,
      }}>🎲 バックギャモン</h1>

      <div className="status-bar">
        <div className="status-turn">
          {gs.phase==='gameover'?<>{plLabel(gs.winner)} の勝利！🎉</>:<>現在のターン: {plLabel(gs.currentPlayer)}</>}
        </div>
        <div className="status-msg">{msg}</div>
      </div>

      <Board gs={boardGs} onPoint={handlePoint} onBar={handleBar}
        legalMoves={legalMoves} barSelected={barSel} barDestSet={barDestSet} theme={theme}/>

      <div className="dice-row">
        {gs.dice.length>0
          ? gs.dice.map((v,i)=><div key={i} className={`die${gs.usedDice.includes(i)?' used':''}`}>{FACES[v]}</div>)
          : <span style={{opacity:.35,fontSize:'.85rem'}}>{isCyber?'-- AWAITING ROLL --':'サイコロ待ち'}</span>}
      </div>

      <div className="btn-row">
        <button className="btn-primary"   onClick={handleRoll}    disabled={gs.phase!=='roll'}>{isCyber?'[ ROLL ]':'🎲 サイコロを振る'}</button>
        <button className="btn-secondary" onClick={handleEndTurn} disabled={!canEnd}>{isCyber?'[ END TURN ]':'ターン終了'}</button>
        <button className="btn-danger"    onClick={handleReset}>{isCyber?'[ RESET ]':'🔄 テーマ選択に戻る'}</button>
      </div>

      <div className="log">
        {gs.log.map((e,i)=><div key={i} className="log-entry">{e}</div>)}
        {!gs.log.length&&<span style={{opacity:.35}}>{isCyber?'-- LOG --':'ゲームログ'}</span>}
      </div>

      {gs.winner&&(
        <div className="overlay">
          <div className="winner-box">
            <h2>{gs.winner===WHITE?'ホワイト':'ブラック'} の勝利！🎉</h2>
            <p>おめでとうございます！</p>
            <button className="btn-primary" onClick={handleReset}>{isCyber?'[ PLAY AGAIN ]':'もう一度プレイ'}</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
